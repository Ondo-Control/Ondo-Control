<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0B1220" />
<title>Ondo Control</title>
<style>
  :root{
    --bg:#0B1220; --card:#111C30; --edge:#1D2B45; --inner:#0D1729;
    --text:#E8EDF4; --dim:#8A98AF; --accent:#F5D90A;
    --win:#2FBF71; --loss:#E5484D; --open:#5B8DEF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;
    padding-bottom:env(safe-area-inset-bottom);}
  .wrap{max-width:700px;margin:0 auto;padding:18px 14px 60px;}
  h1{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;
    font-size:38px;margin:0;letter-spacing:1px;text-transform:uppercase;}
  h1 .a{color:var(--accent);}
  .disp{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;}
  .sub{color:var(--dim);font-size:13px;margin:2px 0 16px;}
  .tabs{display:flex;gap:5px;background:var(--card);border:1px solid var(--edge);
    border-radius:10px;padding:5px;margin-bottom:18px;}
  .tab{flex:1;padding:10px 2px;background:transparent;color:var(--dim);border:none;
    border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
    letter-spacing:.8px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
  .tab.on{background:var(--accent);color:#0B1220;}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:10px;padding:14px;margin-bottom:12px;}
  .stat-label{color:var(--dim);font-size:12px;margin-bottom:4px;}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:32px;font-weight:700;line-height:1;}
  .stat-sub{color:var(--dim);font-size:11px;margin-top:4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .row>.card{flex:1;min-width:135px;margin-bottom:0;}
  label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
  input,select{width:100%;background:var(--inner);border:1px solid var(--edge);
    border-radius:8px;color:var(--text);padding:11px 12px;font-size:15px;outline:none;
    font-family:inherit;}
  .btn{background:var(--accent);color:#0B1220;border:none;border-radius:8px;padding:12px 16px;
    font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;
    cursor:pointer;text-transform:uppercase;width:100%;}
  .btn:disabled{background:#2A3550;color:var(--dim);}
  .btn-sm{background:transparent;border:1px solid var(--dim);color:var(--dim);border-radius:6px;
    padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;width:auto;}
  .btn-win{border-color:var(--win);color:var(--win);}
  .btn-loss{border-color:var(--loss);color:var(--loss);}
  .btn-open{border-color:var(--open);color:var(--open);}
  .badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.2px;
    padding:3px 10px;border-radius:4px;font-weight:600;}
  .b-open{background:#16233C;color:var(--open);}
  .b-win{background:#0F2A1D;color:var(--win);}
  .b-loss{background:#2C1417;color:var(--loss);}
  .grid{display:grid;gap:12px;}
  .muted{color:var(--dim);font-size:12px;line-height:1.5;}
  .empty{padding:26px;text-align:center;color:var(--dim);font-size:14px;}
  .flex{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .save-note{color:var(--accent);font-size:12px;margin-left:8px;}
  .vorschlag{border-color:rgba(245,217,10,.27);}
  .quote{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--accent);}
  .tipbox{background:var(--inner);border-radius:8px;padding:10px 12px;margin-top:10px;}
  pre{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.65;margin:0;}
  a{color:var(--accent);}
</style>
</head>
<body>
<div class="wrap">
  <div class="flex" style="align-items:baseline;">
    <h1>Ondo<span class="a"> Control</span></h1>
    <div id="topSaldo" class="disp" style="font-size:22px;">+0,00 €</div>
  </div>
  <div class="sub"><span id="heute"></span> · Dein persönliches Kommandozentrum · v5<span id="saveNote" class="save-note"></span></div>

  <div class="tabs">
    <button class="tab on" data-tab="dashboard">Dashboard</button>
    <button class="tab" data-tab="wetten">Wetten</button>
    <button class="tab" data-tab="regeln">Regeln</button>
    <button class="tab" data-tab="projekt">Projekt</button>
  </div>

  <div id="view"></div>
</div>

<script>
/* ================= DATEN ================= */
var KEY = "ondo-control-v1";
var state = {
  bets: [],
  regeln: { maxEinsatz: 20 },
  startSaldo: -10.24,           // Tipico vor Ondo Control (30 € ein, Stand 19,76 €)
  eingezahlt: 30,
  vorschlaege: [],
  vorschlaegeInfo: ""
};

function load(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){ var d = JSON.parse(raw); for(var k in d) state[k]=d[k];
      if(!state.regeln) state.regeln={maxEinsatz:20}; }
  }catch(e){}
}
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify(state));
    note("Gespeichert ✓");
  }catch(e){ note("Speichern ging nicht"); }
}
function note(t){
  var n=document.getElementById("saveNote"); n.textContent=t;
  setTimeout(function(){ n.textContent=""; }, 1500);
}

/* ================= HELFER ================= */
function eur(n){ return n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function fmt(n){ return (n>=0?"+":"")+eur(n); }
function profit(b){
  if(b.status==="gewonnen") return b.einsatz*(b.quote-1);
  if(b.status==="verloren") return -b.einsatz;
  return 0;
}
function heuteStr(){
  return new Date().toLocaleDateString("de-DE",{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

/* ================= BERECHNUNGEN ================= */
function calc(){
  var done = state.bets.filter(function(b){return b.status!=="offen";});
  var wins = done.filter(function(b){return b.status==="gewonnen";}).length;
  var wettSaldo = done.reduce(function(s,b){return s+profit(b);},0);
  var offen = state.bets.filter(function(b){return b.status==="offen";})
                        .reduce(function(s,b){return s+b.einsatz;},0);
  var gesamt = wettSaldo + state.startSaldo;
  return {
    done:done.length, wins:wins, wettSaldo:wettSaldo, offen:offen,
    gesamt:gesamt, tipico: state.eingezahlt + gesamt,
    quoteIch: done.length? Math.round(wins/done.length*100):null
  };
}

/* ================= SPIELE LADEN (geprüfte freie Quelle: TheStatsAPI, CORS ok, kein Schlüssel) ================= */
function spieleLaden(btn){
  btn.disabled=true; btn.textContent="Lade Spiele …";
  var f=document.getElementById("ladeFehler"); if(f) f.textContent="";
  fetch("https://www.thestatsapi.com/world-cup/data/fixtures.json")
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(data){
      var heute0 = new Date(); heute0.setHours(0,0,0,0);
      var kommende = (data.fixtures||[])
        .filter(function(m){ return new Date(m.kickoffUtc) >= heute0; })
        .sort(function(a,b){ return new Date(a.kickoffUtc)-new Date(b.kickoffUtc); })
        .slice(0,5);
      if(!kommende.length) throw new Error("Keine kommenden Spiele gefunden");
      state.vorschlaege = kommende.map(function(m,idx){
        var platzhalter = /winner|loser|runners|third|group/i.test(m.homeTeam+m.awayTeam);
        return {
          id:"f"+Date.now()+idx,
          match:m.homeTeam+" – "+m.awayTeam,
          wettbewerb:"WM 2026 · "+(m.stage||"").replace(/-/g," "),
          anpfiff:new Date(m.kickoffUtc).toLocaleString("de-DE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"})+" Uhr",
          tipp:"", quote:"", einsatz:"",
          info: platzhalter
            ? "Teams stehen noch nicht fest (K.o.-Phase). Frag Claude im Chat, wer wirklich spielt + Analyse."
            : "Spielplan geladen. Quote & Tipp trägst du ein — oder du fragst Claude im Chat nach der Analyse."
        };
      });
      state.vorschlaegeInfo = "Spielplan geladen: "+heuteStr()+" · Quelle: TheStatsAPI";
      save(); btn.disabled=false; btn.textContent="🔄 Spiele laden"; render();
    })
    .catch(function(e){
      btn.disabled=false; btn.textContent="🔄 Spiele laden";
      var el=document.getElementById("ladeFehler");
      if(el) el.textContent="Konnte keine Spiele laden ("+(e&&e.message?e.message:"?")+"). Wetten unter NEU von Hand eintragen geht immer.";
    });
}

/* ================= KI-ANALYSE (Gehirn: Anthropic API + Websuche, Schlüssel bleibt lokal) ================= */
function kiAnalyse(btn){
  if(!state.apiKey || state.apiKey.indexOf('sk-ant-')!==0){
    var f0=document.getElementById('ladeFehler');
    if(f0) f0.textContent='Kein gültiger API-Schlüssel. Trage ihn unter REGELN ein (beginnt mit sk-ant-...).';
    return;
  }
  btn.disabled=true; btn.textContent='🧠 Denkt … (30-60 Sek.)';
  var f=document.getElementById('ladeFehler'); if(f) f.textContent='';

  var prompt='Heute ist '+heuteStr()+'. Du bist der Wett-Analyst von Ondo Control und folgst dieser Verfassung: Fakten von Annahmen trennen, mehrere Quellen prüfen, Widersprüche nennen, Risiken ehrlich benennen, keine Scheinsicherheit, keine Gewinnversprechen.\n\nSuche im Web, welche Fussballspiele HEUTE und MORGEN wirklich stattfinden (echte Teamnamen! WM 2026 K.o.-Runde und andere relevante Wettbewerbe) und die aktuellen Wettquoten dazu.\n\nWaehle die 3 Spiele mit dem besten Value. Pro Spiel: konkreter Tipp (auch Ueber/Unter, Beide treffen, Doppelchance), realistische Quote als Zahl, empfohlener Einsatz zwischen 5 und '+state.regeln.maxEinsatz+' Euro je nach Value und Risiko, sehr kurze Begruendung (max 20 Woerter, inkl. Risiko).\n\nDeine letzte Nachricht: AUSSCHLIESSLICH kompaktes JSON, kein Markdown, kein Text davor/danach:\n{"spiele":[{"match":"Team A - Team B","wettbewerb":"WM Achtelfinale","anpfiff":"heute 22:00","tipp":"...","quote":1.85,"einsatz":10,"begruendung":"..."}]}';

  function anfrage(messages){
    return fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{
        'x-api-key':state.apiKey,
        'anthropic-version':'2023-06-01',
        'content-type':'application/json',
        'anthropic-dangerous-direct-browser-access':'true'
      },
      body:JSON.stringify({
        model:'claude-sonnet-4-6',
        max_tokens:1500,
        messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search'}]
      })
    }).then(function(r){
      return r.json().then(function(j){ j._status=r.status; return j; });
    });
  }

  var messages=[{role:'user',content:prompt}];
  var runden=0;

  function weiter(res){
    if(res._status===401) throw new Error('Schluessel ungueltig (401). Unter REGELN pruefen.');
    if(res._status===400 && res.error && /credit/i.test(res.error.message||'')) throw new Error('Guthaben leer. Auf console.anthropic.com aufladen.');
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    if(res.stop_reason==='pause_turn' && runden<4){
      runden++;
      messages.push({role:'assistant',content:res.content});
      return anfrage(messages).then(weiter);
    }
    var texte=(res.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;});
    var parsed=null;
    for(var i=texte.length-1;i>=0 && !parsed;i--){
      var c=texte[i].replace(/```json|```/g,'').trim();
      var s=c.indexOf('{'), e=c.lastIndexOf('}');
      if(s===-1||e===-1) continue;
      try{ parsed=JSON.parse(c.slice(s,e+1)); }catch(x){}
    }
    if(!parsed || !parsed.spiele || !parsed.spiele.length) throw new Error('Antwort ohne lesbares JSON.');
    state.vorschlaege=parsed.spiele.map(function(sp,idx){
      return {
        id:'ki'+Date.now()+idx,
        match:String(sp.match||''),
        wettbewerb:String(sp.wettbewerb||''),
        anpfiff:String(sp.anpfiff||''),
        tipp:String(sp.tipp||''),
        quote:String(sp.quote||''),
        einsatz:String(Math.min(Number(sp.einsatz)||10,state.regeln.maxEinsatz)),
        info:String(sp.begruendung||'')+' — KI-Analyse, kein Gewinnversprechen.'
      };
    });
    state.vorschlaegeInfo='🧠 KI-Analyse: '+heuteStr();
    save();
    btn.disabled=false; btn.textContent='🧠 KI-Analyse (heute)';
    render();
  }

  anfrage(messages).then(weiter).catch(function(e){
    btn.disabled=false; btn.textContent='🧠 KI-Analyse (heute)';
    var el=document.getElementById('ladeFehler');
    if(el) el.textContent='KI-Analyse fehlgeschlagen: '+(e&&e.message?e.message:'unbekannt');
  });
}

/* ================= AKTIONEN ================= */
function addBet(v, einsatzVal){
  var einsatz = Math.min(parseFloat(String(einsatzVal).replace(",","."))||0, state.regeln.maxEinsatz);
  state.bets.unshift({
    id:Date.now(), datum:new Date().toLocaleDateString("de-DE"),
    match:v.match, tipp:v.tipp||"", quote:parseFloat(String(v.quote).replace(",","."))||0,
    einsatz:einsatz, status:"offen", claudeRichtig:null
  });
  save(); go("wetten","historie");
}
function setStatus(id,s){ state.bets.forEach(function(b){ if(b.id===id) b.status=s; }); save(); render(); }
function setClaude(id,r){ state.bets.forEach(function(b){ if(b.id===id) b.claudeRichtig=r; }); save(); render(); }
function delBet(id){ state.bets=state.bets.filter(function(b){return b.id!==id;}); save(); render(); }

/* ================= RENDER ================= */
var tab="dashboard", wtab="vorschlaege";
var entsperrt=false;

function viewLock(){
  return '<div class="card" style="text-align:center;padding:30px 20px;margin-top:30px">'+
    '<div style="font-size:40px;margin-bottom:10px">🔒</div>'+
    '<div class="disp" style="font-size:22px;margin-bottom:14px">Ondo Control ist gesperrt</div>'+
    '<input id="pinEingabe" type="password" inputmode="numeric" placeholder="PIN" style="max-width:200px;margin:0 auto;text-align:center;font-size:22px;letter-spacing:6px"/>'+
    '<div id="pinFehler" class="muted" style="color:var(--loss);margin-top:8px"></div>'+
    '<button class="btn" style="max-width:200px;margin:14px auto 0" onclick="pinPruefen()">Entsperren</button>'+
  '</div>';
}
function pinPruefen(){
  var v=document.getElementById('pinEingabe').value;
  if(v===state.pin){ entsperrt=true; render(); }
  else{ var f=document.getElementById('pinFehler'); if(f) f.textContent='Falscher PIN'; }
}

function go(t,w){ tab=t; if(w) wtab=w;
  document.querySelectorAll(".tab").forEach(function(el){ el.classList.toggle("on", el.dataset.tab===t); });
  render();
}

function render(){
  var c=calc(), v=document.getElementById("view");
  if(state.pin && !entsperrt){
    document.getElementById("topSaldo").textContent="🔒";
    document.getElementById("topSaldo").style.color="var(--dim)";
    v.innerHTML=viewLock();
    var pe=document.getElementById('pinEingabe');
    if(pe) pe.addEventListener('keyup',function(e){ if(e.key==='Enter') pinPruefen(); });
    return;
  }
  document.getElementById("topSaldo").textContent=fmt(c.gesamt);
  document.getElementById("topSaldo").style.color = c.gesamt>0?"var(--win)":c.gesamt<0?"var(--loss)":"var(--text)";

  if(tab==="dashboard") v.innerHTML=viewDashboard(c);
  else if(tab==="wetten") v.innerHTML=viewWetten(c);
  else if(tab==="regeln") v.innerHTML=viewRegeln();
  else if(tab==="projekt") v.innerHTML=viewProjekt();
  bind();
}

function viewDashboard(c){
  return ''+
  '<div class="row">'+
    '<div class="card"><div class="stat-label">Gesamt-Bilanz</div>'+
      '<div class="stat-val" style="color:'+(c.gesamt>0?"var(--win)":c.gesamt<0?"var(--loss)":"var(--text)")+'">'+fmt(c.gesamt)+'</div>'+
      '<div class="stat-sub">Enthält Tipico-Start '+fmt(state.startSaldo)+'</div></div>'+
    '<div class="card"><div class="stat-label">Tipico-Kontostand (ca.)</div>'+
      '<div class="stat-val">'+eur(c.tipico)+'</div>'+
      '<div class="stat-sub">Eingezahlt '+eur(state.eingezahlt)+' + Bilanz</div></div>'+
  '</div>'+
  '<div class="row">'+
    '<div class="card"><div class="stat-label">Wett-Saldo</div>'+
      '<div class="stat-val" style="color:'+(c.wettSaldo>0?"var(--win)":c.wettSaldo<0?"var(--loss)":"var(--text)")+'">'+fmt(c.wettSaldo)+'</div>'+
      '<div class="stat-sub">'+c.done+' abgeschlossen · '+eur(c.offen)+' offen</div></div>'+
    '<div class="card"><div class="stat-label">Deine Trefferquote</div>'+
      '<div class="stat-val">'+(c.quoteIch===null?"–":c.quoteIch+" %")+'</div>'+
      '<div class="stat-sub">'+(c.done?c.wins+" von "+c.done:"Noch keine Wette")+'</div></div>'+
  '</div>'+
  '<div class="muted" style="margin-top:6px">Module: Wetten (aktiv) · Finanzen, Content, Organisation folgen.</div>';
}

function viewWetten(c){
  var sub='<div class="tabs">'+
    '<button class="tab '+(wtab==="vorschlaege"?"on":"")+'" onclick="wtab=\'vorschlaege\';render()">Vorschläge</button>'+
    '<button class="tab '+(wtab==="neu"?"on":"")+'" onclick="wtab=\'neu\';render()">Neu</button>'+
    '<button class="tab '+(wtab==="historie"?"on":"")+'" onclick="wtab=\'historie\';render()">Historie</button>'+
  '</div>';

  if(wtab==="vorschlaege"){
    var list = state.vorschlaege.map(function(v){
      return '<div class="card vorschlag">'+
        '<div class="flex"><div><div class="disp" style="font-size:21px">'+v.match+'</div>'+
        '<div class="muted">'+(v.wettbewerb||"")+' · '+(v.anpfiff||"")+'</div></div>'+
        (v.quote?'<div class="quote">'+v.quote+'</div>':'')+'</div>'+
        '<div class="tipbox">'+
          '<label>Tipp</label><input value="'+(v.tipp||"")+'" oninput="state.vorschlaege.find(function(x){return x.id===\''+v.id+'\'}).tipp=this.value"/>'+
          '<div style="display:flex;gap:10px;margin-top:8px">'+
            '<div style="flex:1"><label>Quote</label><input inputmode="decimal" value="'+(v.quote||"")+'" oninput="state.vorschlaege.find(function(x){return x.id===\''+v.id+'\'}).quote=this.value"/></div>'+
            '<div style="flex:1"><label>Einsatz (€)</label><input inputmode="decimal" value="'+(v.einsatz||"")+'" oninput="state.vorschlaege.find(function(x){return x.id===\''+v.id+'\'}).einsatz=this.value"/></div>'+
          '</div>'+
        '</div>'+
        '<div class="muted" style="margin-top:8px">'+(v.info||"")+'</div>'+
        '<button class="btn" style="margin-top:10px" onclick="var x=state.vorschlaege.find(function(y){return y.id===\''+v.id+'\'}); if(x.match&&x.quote&&x.einsatz){addBet(x,x.einsatz);}else{alert(\'Bitte Quote und Einsatz eintragen\');}">✓ Übernehmen</button>'+
      '</div>';
    }).join("");
    return sub+
      '<button class="btn" onclick="kiAnalyse(this)">🧠 KI-Analyse (heute)</button>'+
      '<div style="height:8px"></div>'+
      '<button class="btn" style="background:transparent;border:1px solid var(--edge);color:var(--dim)" onclick="spieleLaden(this)">🔄 Nur Spielplan laden (ohne KI)</button>'+
      '<div id="ladeFehler" class="muted" style="color:var(--loss);margin:10px 0"></div>'+
      (state.vorschlaegeInfo?'<div class="muted" style="margin:8px 0">'+state.vorschlaegeInfo+'</div>':'')+
      (list||'<div class="card empty">Noch keine Spiele. Tippe „Spiele laden" oder trage unter „Neu" von Hand ein.<br><br>Tipp: Frag Claude im Chat nach Analysen — trag Tipp & Quote dann hier ein.</div>');
  }

  if(wtab==="neu"){
    return sub+'<div class="card"><div class="grid">'+
      '<div><label>Spiel</label><input id="f_match" placeholder="z. B. Bayern – Dortmund"/></div>'+
      '<div><label>Tipp</label><input id="f_tipp" placeholder="z. B. Sieg Bayern"/></div>'+
      '<div style="display:flex;gap:10px">'+
        '<div style="flex:1"><label>Quote</label><input id="f_quote" inputmode="decimal" placeholder="1,85"/></div>'+
        '<div style="flex:1"><label>Einsatz (€)</label><input id="f_einsatz" inputmode="decimal" placeholder="10"/></div>'+
      '</div>'+
      '<button class="btn" onclick="var m=f_match.value,q=f_quote.value,e=f_einsatz.value; if(m&&q&&e){addBet({match:m,tipp:f_tipp.value,quote:q},e);}else{alert(\'Bitte Spiel, Quote und Einsatz ausfüllen\');}">Wette speichern</button>'+
    '</div></div>';
  }

  // historie
  if(!state.bets.length) return sub+'<div class="card empty">Noch keine Wetten erfasst.</div>';
  var h=state.bets.map(function(b){
    var badge = b.status==="offen"?'<span class="badge b-open">OFFEN</span>':
                b.status==="gewonnen"?'<span class="badge b-win">GEWONNEN</span>':
                '<span class="badge b-loss">VERLOREN</span>';
    var akt = b.status==="offen"
      ? '<button class="btn-sm btn-win" onclick="setStatus('+b.id+',\'gewonnen\')">✓ Gewonnen</button> '+
        '<button class="btn-sm btn-loss" onclick="setStatus('+b.id+',\'verloren\')">✗ Verloren</button>'
      : '<button class="btn-sm" onclick="setStatus('+b.id+',\'offen\')">Zurücksetzen</button>';
    var claude = (b.tipp && b.status!=="offen" && b.claudeRichtig===null)
      ? ' <button class="btn-sm btn-open" onclick="setClaude('+b.id+',true)">Claude richtig</button>'+
        ' <button class="btn-sm btn-open" onclick="setClaude('+b.id+',false)">Claude falsch</button>'
      : (b.claudeRichtig!==null?' <span class="muted">Claude: '+(b.claudeRichtig?"richtig ✓":"falsch ✗")+'</span>':'');
    var pnl = b.status!=="offen"
      ? '<div style="color:'+(profit(b)>=0?"var(--win)":"var(--loss)")+';font-weight:600;margin-top:2px">'+fmt(profit(b))+'</div>'
      : '<div class="muted">Möglicher Gewinn: <span style="color:var(--win)">'+fmt(b.einsatz*(b.quote-1))+'</span></div>';
    return '<div class="card">'+
      '<div class="flex"><div><div class="disp" style="font-size:19px">'+b.match+'</div>'+
      '<div class="muted">'+b.datum+' · Quote '+b.quote.toLocaleString("de-DE")+' · Einsatz '+eur(b.einsatz)+'</div></div>'+badge+'</div>'+
      (b.tipp?'<div style="font-size:13px;margin-top:8px">Tipp: '+b.tipp+'</div>':'')+pnl+
      '<div style="margin-top:12px">'+akt+claude+
      ' <button class="btn-sm" style="float:right" onclick="delBet('+b.id+')">Löschen</button></div>'+
    '</div>';
  }).join("");
  return sub+h;
}
