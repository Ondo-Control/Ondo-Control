<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0B1220" />
<title>Ondo Control</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
  :root{
    --bg:#0B1220; --card:#111C30; --edge:#1D2B45; --inner:#0D1729;
    --text:#E8EDF4; --dim:#8A98AF; --accent:#F5D90A;
    --win:#2FBF71; --loss:#E5484D; --open:#5B8DEF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;}
  .wrap{max-width:700px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px 110px;}
  h1{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;
    font-size:34px;margin:0;letter-spacing:1px;text-transform:uppercase;}
  h1 .a{color:var(--accent);}
  .disp{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;}
  .sub{color:var(--dim);font-size:12px;margin:2px 0 16px;}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:12px;padding:15px;margin-bottom:12px;}
  .stat-label{color:var(--dim);font-size:12px;margin-bottom:4px;}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;line-height:1;}
  .stat-sub{color:var(--dim);font-size:11px;margin-top:4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .row>.card{flex:1;min-width:135px;margin-bottom:0;}
  label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
  input,select{width:100%;background:var(--inner);border:1px solid var(--edge);
    border-radius:8px;color:var(--text);padding:11px 12px;font-size:15px;outline:none;
    font-family:inherit;}
  select{appearance:none;-webkit-appearance:none;}
  .btn{background:var(--accent);color:#0B1220;border:none;border-radius:9px;padding:12px 16px;
    font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;
    cursor:pointer;text-transform:uppercase;width:100%;}
  .btn:disabled{background:#2A3550;color:var(--dim);}
  .btn-ghost{background:transparent;border:1px solid var(--edge);color:var(--dim);}
  .btn-sm{background:transparent;border:1px solid var(--dim);color:var(--dim);border-radius:6px;
    padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;width:auto;}
  .btn-win{border-color:var(--win);color:var(--win);}
  .btn-loss{border-color:var(--loss);color:var(--loss);}
  .btn-open{border-color:var(--open);color:var(--open);}
  .badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.2px;
    padding:3px 10px;border-radius:4px;font-weight:600;}
  .b-open{background:#16233C;color:var(--open);}
  .b-win{background:#0F2A1D;color:var(--win);}
  .b-loss{background:#2C1417;color:var(--loss);}
  .grid{display:grid;gap:12px;}
  .muted{color:var(--dim);font-size:12px;line-height:1.5;}
  .empty{padding:26px;text-align:center;color:var(--dim);font-size:14px;}
  .flex{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .save-note{color:var(--accent);font-size:12px;margin-left:8px;}
  .quote{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--accent);}
  .tipbox{background:var(--inner);border-radius:8px;padding:10px 12px;margin-top:10px;}
  pre{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.65;margin:0;}
  .subtabs{display:flex;gap:5px;background:var(--card);border:1px solid var(--edge);
    border-radius:10px;padding:5px;margin-bottom:16px;}
  .subtab{flex:1;padding:9px 2px;background:transparent;color:var(--dim);border:none;
    border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
    letter-spacing:.8px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
  .subtab.on{background:var(--accent);color:#0B1220;}
  .module{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .module .mi{font-size:26px;margin-right:12px;}
  .module .mt{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}
  .module .md{color:var(--dim);font-size:12px;}
  .mstatus{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.2px;font-weight:700;}
  /* Vorhersage-Elemente v19 */
  .mkt{display:flex;justify-content:space-between;align-items:center;gap:8px;
    padding:7px 0;border-top:1px solid var(--edge);font-size:13px;}
  .mkt .p{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:var(--accent);}
  .score{font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--accent);line-height:1;}
  .ktab{width:100%;border-collapse:collapse;font-size:13px;margin-top:6px;}
  .ktab th,.ktab td{padding:5px 4px;text-align:right;border-top:1px solid var(--edge);}
  .ktab th:first-child,.ktab td:first-child{text-align:left;}
  .ktab th{color:var(--dim);font-weight:500;font-size:11px;border-top:none;}
  /* Bottom-Navigation */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,23,41,.97);
    border-top:1px solid var(--edge);display:flex;z-index:50;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(10px);}
  .nav button{flex:1;background:none;border:none;color:var(--dim);cursor:pointer;
    font-family:inherit;font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .nav button .ic{font-size:22px;line-height:1;}
  .nav button.on{color:var(--accent);}
</style>
</head>
<body>
<div id="updateBar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--accent);color:#0B1220;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  align-items:center;justify-content:space-between;gap:10px;
  font-size:14px;font-weight:600;">
  <span>🔄 Update verfügbar / Mise à jour dispo / Update available</span>
  <button style="background:#0B1220;color:var(--accent);border:none;border-radius:8px;padding:8px 14px;
    font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;
    text-transform:uppercase;">Aktualisieren</button>
</div>
<div class="wrap">
  <div class="flex" style="align-items:baseline;">
    <h1>Ondo<span class="a"> Control</span></h1>
    <div id="topSaldo" class="disp" style="font-size:21px;">+0,00 €</div>
  </div>
  <div class="sub"><span id="heute"></span> · v19.3 BETA<span id="saveNote" class="save-note"></span></div>
  <div id="view"></div>
</div>

<div class="nav" id="nav">
  <button data-tab="home"><span class="ic">🏠</span><span id="nvHome">Start</span></button>
  <button data-tab="wetten"><span class="ic">🎯</span><span id="nvBets">Wetten</span></button>
  <button data-tab="finanzen"><span class="ic">💰</span><span id="nvFin">Finanzen</span></button>
  <button data-tab="mehr"><span class="ic">⚙️</span><span id="nvMore">Mehr</span></button>
</div>

<script>
/* ================= VERSION & UPDATE-CHECK ================= */
var APP_VERSION = 18;
function checkUpdate(){
  fetch('version.json?ts='+Date.now(),{cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(j && Number(j.v) > APP_VERSION){
        var bar=document.getElementById('updateBar');
        if(bar){
          bar.style.display='flex';
          bar.querySelector('button').onclick=function(){
            location.href='OndoControl.html?u='+Number(j.v)+'x'+Date.now();
          };
        }
      }
    })
    .catch(function(e){ /* offline oder Datei fehlt: still bleiben */ });
}

/* ================= MAERKTE AUS ERGEBNIS ABLEITEN (fester Code, keine KI) =================
   Gemini-Hinweis v19: Die KI nennt NUR das Ergebnis. Welche Maerkte daraus folgen,
   rechnet die App — so kann sich die KI nicht selbst widersprechen. */
function maerkteBauen(match, heim, gast, p1x2, pTore, pBtts){
  var tm = teamsAus(match);
  var ges = heim + gast;
  var m = [];
  m.push({
    typ:'1x2',
    code: heim>gast ? 'sieg_heim' : (heim<gast ? 'sieg_gast' : 'remis'),
    label: heim>gast ? ('Sieg '+tm.heim) : (heim<gast ? ('Sieg '+tm.gast) : t('draw')),
    p: p1x2, status:'offen'
  });
  /* Ja/Nein-Maerkte: unter 50 Prozent waere widerspruechlich ("Ja zu 42 %" heisst in
     Wahrheit "Nein zu 58 %"). Deshalb dreht die App die Aussage um. Rechnerisch identisch,
     aber die angezeigte Behauptung ist die, an die das Gehirn wirklich glaubt. */
  function jaNein(typ, codeA, labelA, codeB, labelB, p){
    if(p < 50) return { typ:typ, code:codeB, label:labelB, p:(100-p), gedreht:true, status:'offen' };
    return { typ:typ, code:codeA, label:labelA, p:p, status:'offen' };
  }
  m.push(jaNein('tore',
    (ges>2.5 ? 'ueber' : 'unter'), (ges>2.5 ? t('over25') : t('under25')),
    (ges>2.5 ? 'unter' : 'ueber'), (ges>2.5 ? t('under25') : t('over25')),
    pTore));
  var btts = (heim>0 && gast>0);
  m.push(jaNein('btts',
    (btts ? 'btts_ja' : 'btts_nein'), (btts ? t('bttsYes') : t('bttsNo')),
    (btts ? 'btts_nein' : 'btts_ja'), (btts ? t('bttsNo') : t('bttsYes')),
    pBtts));
  return m;
}
/* Urteil per fester Regel — deterministisch, keine KI-Logik mehr (v19 Punkt 3) */
function marktUrteil(code, h, g){
  var ges = h + g;
  switch(code){
    case 'sieg_heim': return h > g;
    case 'sieg_gast': return g > h;
    case 'remis':     return h === g;
    case 'ueber':     return ges > 2.5;
    case 'unter':     return ges < 2.5;
    case 'btts_ja':   return (h > 0 && g > 0);
    case 'btts_nein': return !(h > 0 && g > 0);
  }
  return null;
}

function calc(){
  var done = state.bets.filter(function(b){return b.status!=="offen";});
  var wins = done.filter(function(b){return b.status==="gewonnen";}).length;
  var wettSaldo = done.reduce(function(s,b){return s+profit(b);},0);
  var offen = state.bets.filter(function(b){return b.status==="offen";})
                        .reduce(function(s,b){return s+b.einsatz;},0);
  var gesamt = wettSaldo + state.startSaldo;
  return {
    done:done.length, wins:wins, wettSaldo:wettSaldo, offen:offen,
    gesamt:gesamt, tipico: state.eingezahlt + gesamt - offen - (state.ausgezahlt||0),
    quoteIch: done.length? Math.round(wins/done.length*100):null
  };
}
/* Trefferquote: ab v19 Nebenkennzahl (Ergaenzung von ChatGPT), zaehlt nur v19-Aussagen */
function calcAI(){
  function zaehl(quelle){
    var n=0, tr=0;
    (state.kiProtokoll||[]).forEach(function(e){
      if(e.aera!=='v19') return;
      if((e.herkunft||'sonnet')!==quelle) return;
      (e.maerkte||[]).forEach(function(m){
        if(m.status==='richtig'){ n++; tr++; }
        else if(m.status==='falsch'){ n++; }
      });
    });
    return { n:n, tr:tr, q: n? Math.round(tr/n*100):null };
  }
  var s = zaehl('sonnet'), f = zaehl('flash');
  var n = s.n + f.n, treffer = s.tr + f.tr;
  return { n:n, tr:treffer, q: n? Math.round(treffer/n*100):null, sonnet:s, flash:f };
}
/* Kalibrierung: Hauptkennzahl ab v19. Nicht "wie oft richtig", sondern
   "stimmen die Prozentangaben mit der Wirklichkeit ueberein". */
function calcKalibrierung(quelle){
  var punkte=[];
  (state.kiProtokoll||[]).forEach(function(e){
    if(e.aera!=='v19') return;
    if(quelle && (e.herkunft||'sonnet')!==quelle) return;
    (e.maerkte||[]).forEach(function(m){
      if(m.status==='richtig'||m.status==='falsch'){
        var p=Number(m.p); if(isNaN(p)) p=50;
        punkte.push({ p:Math.max(1,Math.min(99,p)), ok:(m.status==='richtig') });
      }
    });
  });
  if(!punkte.length) return null;
  var baender=[[1,49],[50,59],[60,69],[70,79],[80,89],[90,99]];
  var zeilen=[], summe=0, n=0;
  baender.forEach(function(b){
    var g=punkte.filter(function(x){ return x.p>=b[0] && x.p<=b[1]; });
    if(!g.length) return;
    var behauptet=g.reduce(function(s,x){return s+x.p;},0)/g.length;
    var echt=g.filter(function(x){return x.ok;}).length/g.length*100;
    zeilen.push({ von:b[0], bis:b[1], n:g.length,
      behauptet:Math.round(behauptet), echt:Math.round(echt) });
    summe += Math.abs(behauptet-echt)*g.length; n+=g.length;
  });
  return { zeilen:zeilen, gesamt:punkte.length, abw: n? Math.round(summe/n):null };
}

var GEMINI_MODELS = ['gemini-flash-latest'];
function gLadeModelle(){
  return fetch('https://generativelanguage.googleapis.com/v1beta/models?key='+encodeURIComponent(state.geminiKey))
    .then(function(r){ return r.json(); })
    .then(function(j){
      var liste=(j.models||[]).filter(function(m){
        return (m.supportedGenerationMethods||[]).indexOf('generateContent')>=0 &&
               /flash/i.test(m.name) &&
               !/image|tts|live|audio|embedding|8b/i.test(m.name);
      }).map(function(m){ return m.name.replace('models/',''); });
      var stabil = liste.filter(function(n){ return !/latest|preview|exp/i.test(n); });
      var rest   = liste.filter(function(n){ return  /latest|preview|exp/i.test(n); });
      var sortiert = stabil.concat(rest);
      if(sortiert.length){ state.geminiModelListe = sortiert; save(); }
      return sortiert;
    })
    .catch(function(){ return []; });
}
function geminiCall(opts, modellIndex){
  var liste = (state.geminiModelListe && state.geminiModelListe.length) ? state.geminiModelListe : GEMINI_MODELS;
  if(modellIndex===undefined && !(state.geminiModelListe && state.geminiModelListe.length)){
    return gLadeModelle().then(function(){ return geminiCall(opts, 0); });
  }
  var modell = (modellIndex===undefined && state.geminiModel) ? state.geminiModel : liste[Math.min(modellIndex||0, liste.length-1)];
  var parts = [];
  if(opts.imageB64) parts.push({ inlineData:{ mimeType:'image/jpeg', data:opts.imageB64 } });
  parts.push({ text: opts.prompt });
  var body = { contents:[{ parts: parts }] };
  if(opts.useSearch) body.tools = [{ google_search: {} }];
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+modell+':generateContent?key='+encodeURIComponent(state.geminiKey),{
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body: JSON.stringify(body)
  }).then(function(r){ return r.json().then(function(j){ j._status=r.status; return j; }); })
  .then(function(res){
    if(res.error){
      var msg = res.error.message || String(res._status);
      var modellProblem = res._status===404 || /no longer available|not found|not supported/i.test(msg);
      var ueberlastet = res._status===503 || res._status===429 || /high demand|overloaded|try again/i.test(msg);
      var idx = (modellIndex||0);
      if(modellProblem || ueberlastet){
        if(modellProblem) state.geminiModel = null;
        if(idx < liste.length-1){
          return geminiCall(opts, idx+1);
        }
        if(!opts._frisch){
          opts._frisch = true;
          state.geminiModelListe = null;
          return gLadeModelle().then(function(neu){
            if(neu.length) return geminiCall(opts, 0);
            return { error:{ message:'Gemini: kein nutzbares Modell fuer diesen Schluessel gefunden' }, _status:404 };
          });
        }
      }
      return { error:{ message:'Gemini ('+modell+'): '+msg }, _status:res._status };
    }
    try{
      var txt = (res.candidates[0].content.parts||[]).map(function(p){return p.text||'';}).join('\n');
      if(!state.geminiModel){ state.geminiModel = modell; save(); }
      return { content:[{ type:'text', text:txt }], stop_reason:'end_turn', _status:res._status };
    }catch(e){
      return { error:{ message:'Gemini ('+modell+'): Antwort nicht lesbar' }, _status:500 };
    }
  });
}

function apiCall(body){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'x-api-key':state.apiKey,
      'anthropic-version':'2023-06-01',
      'content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify(body)
  }).then(function(r){ return r.json().then(function(j){ j._status=r.status; return j; }); });
}
function parseJsonBlock(res){
  var texte=(res.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;});
  var parsed=null;
  for(var i=texte.length-1;i>=0 && !parsed;i--){
    var c=texte[i].replace(/```json|```/g,'').trim();
    var s=c.indexOf('{'), e=c.lastIndexOf('}');
    if(s===-1||e===-1) continue;
    try{ parsed=JSON.parse(c.slice(s,e+1)); }catch(x){}
  }
  return parsed;
}

/* Anthropic mit Websuche + Nachfass-Runden */
function sonnetSuche(prompt, maxUses, maxTokens){
  var messages=[{role:'user',content:prompt}];
  var runden=0;
  function schritt(res){
    if(res._status===401) throw new Error(t('keyBad'));
    if(res._status===400 && res.error && /credit/i.test(res.error.message||'')) throw new Error(t('credEmpty'));
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    if(res.stop_reason==='pause_turn' && runden<3){
      runden++;
      messages.push({role:'assistant',content:res.content});
      return apiCall({model:'claude-sonnet-4-6',max_tokens:maxTokens,messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search',max_uses:maxUses}]}).then(schritt);
    }
    return res;
  }
  return apiCall({model:'claude-sonnet-4-6',max_tokens:maxTokens,messages:messages,
    tools:[{type:'web_search_20250305',name:'web_search',max_uses:maxUses}]}).then(schritt);
}

    'WICHTIG ZUR EHRLICHKEIT: Deine Prozentangaben werden gemessen. Sagst du oft 80 Prozent, muessen etwa 8 von 10 dieser Aussagen eintreffen. '+
    'Wenn du ein Team oder eine Liga kaum kennst, nenne Werte nahe 50 — das ist kein Makel, sondern korrekt. '+
    'Uebertriebene Sicherheit faellt in der Auswertung auf. Gib fuer JEDES Spiel eine Vorhersage ab, auch bei duenner Datenlage.\n\n'+
    (fruehere?('Deine letzten eigenen Vorhersagen: '+fruehere+'\n\n'):'')+
    'SPIELE:\n'+spieleTxt+'\n\n'+
    'Letzte Nachricht: NUR kompaktes JSON:\n'+
    '{"vorhersagen":[{"match":"Team A - Team B","heim":2,"gast":1,"p1x2":58,"pTore":62,"pBtts":55,"begruendung":"..."}]}';

  var call = (gehirn==='flash')
    ? geminiCall({ prompt: prompt })
    : apiCall({ model:'claude-sonnet-4-6', max_tokens:2500, messages:[{role:'user',content:prompt}] });

  return call.then(function(res){
    if(res._status===401) throw new Error(t('keyBad'));
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    var parsed=parseJsonBlock(res);
    if(!parsed || !parsed.vorhersagen) throw new Error(t('noJson'));
    return parsed.vorhersagen;
  }).catch(function(e){
    return { _fehler: (e && e.message) ? e.message : '?' };
  });
}

/* ================= VORHERSAGE-LAUF (v19 Hauptknopf) ================= */
function vorhersagen(btn){
  if(!hatSonnet() && !hatGemini()){
    var f0=document.getElementById('ladeFehler'); if(f0) f0.textContent=t('noKey'); return;
  }
  var f=document.getElementById('ladeFehler'); if(f) f.textContent='';
  btn.disabled=true; btn.textContent=t('predListing');

  spielListeHolen().then(function(liste){
    if(!liste.length) throw new Error(t('loadFail'));
    btn.textContent=t('predBrain');
    var jobs=[], namen=[];
    if(hatSonnet()){ jobs.push(vorhersageGehirn('sonnet', liste)); namen.push('sonnet'); }
    if(hatGemini()){ jobs.push(vorhersageGehirn('flash', liste));  namen.push('flash'); }
    return Promise.all(jobs).then(function(res){ return { liste:liste, res:res, namen:namen }; });
  }).then(function(paket){
    if(!state.kiProtokoll) state.kiProtokoll=[];
    var heuteD=new Date().toLocaleDateString('de-DE');
    var neu=[], fehler=[];
    paket.res.forEach(function(vorher, i){
      var gehirn=paket.namen[i];
      if(!vorher || vorher._fehler){ fehler.push(gehirn+': '+((vorher&&vorher._fehler)||'?')); return; }
      vorher.forEach(function(v, idx){
        var h=Math.max(0,Math.round(Number(v.heim))), g=Math.max(0,Math.round(Number(v.gast)));
        if(isNaN(h)||isNaN(g)) return;
        function pz(x){ var n=Math.round(Number(x)); if(isNaN(n)) n=50; return Math.max(1,Math.min(99,n)); }
        var match=String(v.match||'');
        var eintrag={
          id:'v'+Date.now()+'_'+gehirn+'_'+idx,
          aera:'v19',
          datum:heuteD,
          match:match,
          wettbewerb:(paket.liste[idx]&&paket.liste[idx].wettbewerb)||'',
          herkunft:gehirn,
          heim:h, gast:g,
          begruendung:String(v.begruendung||''),
          maerkte:maerkteBauen(match,h,g,pz(v.p1x2),pz(v.pTore),pz(v.pBtts)),
          ergebnisHeim:null, ergebnisGast:null,
          status:'offen'
        };
        state.kiProtokoll.unshift(eintrag);
        neu.push(eintrag);
      });
    });
    state.vorhersagen = { datum:heuteStr(), ids:neu.map(function(e){return e.id;}) };
    state.vorschlaegeInfo = t('kiOf')+': '+heuteStr()+(fehler.length?(' · ⚠ '+fehler.join(' · ')):'');
    save();
    btn.disabled=false; btn.textContent=t('predBtn');
    render();
  }).catch(function(e){
    btn.disabled=false; btn.textContent=t('predBtn');
    var el=document.getElementById('ladeFehler');
    if(el) el.textContent=(e&&e.message?e.message:'?');
  });
}

/* ================= SCHEIN-FOTO ================= */
function fotoLesen(input){
  if(!input.files || !input.files[0]) return;
  if(!hatGemini() && !hatSonnet()){
    var f0=document.getElementById('fotoStatus');
    if(f0) f0.textContent=t('noKey');
    return;
  }
  var st=document.getElementById('fotoStatus');
  if(st) st.textContent=t('photoRead');
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1200, w=img.width, h=img.height;
      if(w>max){ h=Math.round(h*max/w); w=max; }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var b64=cv.toDataURL('image/jpeg',0.8).split(',')[1];
      var fotoPrompt='Das ist ein Foto eines Wettscheins (z.B. Tipico). Lies ihn exakt. Bei einer Kombi: EIN Eintrag, Gesamtquote = Moeglicher Gewinn geteilt durch Einsatz (2 Dezimalen). Bei Einzelwetten: ein Eintrag pro Wette. Status: VERLOREN -> verloren, GEWONNEN -> gewonnen, sonst offen. NUR kompaktes JSON: {"wetten":[{"match":"...","tipp":"...","quote":2.05,"einsatz":7,"status":"offen"}]}';
      var fotoCall = hatGemini()
        ? geminiCall({ prompt: fotoPrompt, imageB64: b64 })
        : apiCall({model:'claude-sonnet-4-6',max_tokens:800,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
              {type:'text',text:fotoPrompt}
            ]}]
          });
      fotoCall.then(function(res){
        if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
        var parsed=parseJsonBlock(res);
        if(!parsed || !parsed.wetten || !parsed.wetten.length) throw new Error(t('noJson'));
        var n=0;
        parsed.wetten.forEach(function(w,idx){
          state.bets.unshift({
            id:Date.now()+idx,
            datum:new Date().toLocaleDateString('de-DE'),
            match:String(w.match||'?'),
            tipp:String(w.tipp||''),
            quote:Number(w.quote)||0,
            einsatz:Number(w.einsatz)||0,
            status:(w.status==='gewonnen'||w.status==='verloren')?w.status:'offen',
            claudeRichtig:null
          });
          n++;
        });
        save();
        if(st) st.textContent='✅ '+n+' '+t('photoOk');
        setTimeout(function(){ go('wetten','historie'); },800);
      })
      .catch(function(e){
        if(st) st.textContent=t('photoFail')+(e&&e.message?e.message:'?');
      });
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(input.files[0]);
}

/* ================= ERGEBNISSE PRUEFEN (v19: KI liefert nur Tore) ================= */
var pruefListe = [];
function ergebnissePruefen(btn){
  if(!hatGemini() && !hatSonnet()){
    var f0=document.getElementById('pruefStatus'); if(f0) f0.textContent=t('noKey'); return;
  }
  var offeneP = (state.kiProtokoll||[]).filter(function(e){
    return e.aera==='v19' && e.status==='offen';
  });
  /* Doppelte Spiele nur einmal abfragen: beide Gehirne teilen sich denselben Endstand */
  var spiele={}, auftrag=[];
  offeneP.forEach(function(e){
    var k=e.match+'|'+e.datum;
    if(!spiele[k]){ spiele[k]={ key:'S'+auftrag.length, match:e.match, datum:e.datum, eintraege:[] }; auftrag.push(spiele[k]); }
    spiele[k].eintraege.push(e.id);
  });
  var offeneBets = state.bets.filter(function(b){return b.status==='offen';});

  var st=document.getElementById('pruefStatus');
  if(!auftrag.length && !offeneBets.length){ if(st) st.textContent=t('noOpen'); return; }
  btn.disabled=true; btn.textContent=t('checking');
  if(st) st.textContent='';

  var zeilen = auftrag.map(function(a){ return a.key+': '+a.match+' (vom '+a.datum+')'; })
    .concat(offeneBets.map(function(b){ return 'B'+b.id+': '+b.match+' (vom '+b.datum+')'; }));

  var prompt='Heute ist '+heuteStr()+'. Ermittle per Websuche fuer jedes Spiel den ENDSTAND NACH 90 MINUTEN '+
    'inkl. Nachspielzeit — OHNE Verlaengerung, OHNE Elfmeterschiessen.\n\n'+
    'Du sollst NICHT beurteilen, ob eine Wette gewonnen hat. Nenne ausschliesslich die Tore. '+
    'heim = erstgenanntes Team, gast = zweitgenanntes Team.\n\n'+
    'DREI HAEUFIGE FEHLER, DIE DU VERMEIDEN MUSST:\n'+
    '1. FALSCHES DUELL: Zwei Teams spielen mehrmals pro Jahr gegeneinander. Pruefe, dass dein Ergebnis wirklich vom angegebenen Datum stammt — NICHT von einer frueheren Begegnung derselben Teams.\n'+
    '2. ZEITZONEN: Spiele in Suedamerika (Argentinien, Brasilien) und Nordamerika werden abends Ortszeit angepfiffen und enden in Europa erst NACH MITTERNACHT, also am Folgetag. Ein Spiel vom '+
    'angegebenen Datum kann in europaeischen Quellen unter dem Folgetag stehen. Suche nach dem Spieltag der Liga, nicht nur nach dem Kalenderdatum.\n'+
    '3. RATEN: Setze fertig:false, wenn das Spiel noch laeuft, noch nicht angepfiffen wurde oder du den Endstand nicht aus einer verlaesslichen Quelle bestaetigen kannst.\n\n'+
    'Nenne zu jedem Ergebnis ZUSAETZLICH das Datum, an dem das gefundene Spiel laut deiner Quelle stattfand (Format TT.MM.JJJJ), und den Wettbewerb — damit kontrolliert werden kann, ob du das richtige Spiel erwischt hast.\n\n'+
    zeilen.join('\n')+
    '\n\nLetzte Nachricht: NUR kompaktes JSON:\n{"ergebnisse":[{"id":"S0","heim":2,"gast":1,"fertig":true,"datum":"23.07.2026","wettbewerb":"Liga Profesional"}]}';

  var call = hatGemini()
    ? geminiCall({ prompt: prompt, useSearch: true })
    : sonnetSuche(prompt, 5, 1500);

  call.then(function(res){
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    var parsed=parseJsonBlock(res);
    if(!parsed || !parsed.ergebnisse) throw new Error(t('noJson'));
    pruefListe=[];
    function tageAbstand(a,b){
      function z(s){ var m=String(s||'').match(/(\d{1,2})\.(\d{1,2})\.(\d{4})/); if(!m) return null;
        return Date.UTC(Number(m[3]),Number(m[2])-1,Number(m[1])); }
      var x=z(a), y=z(b);
      if(x===null||y===null) return null;
      return Math.abs(x-y)/86400000;
    }
    parsed.ergebnisse.forEach(function(r){
      if(r.fertig===false) return;
      var h=Math.round(Number(r.heim)), g=Math.round(Number(r.gast));
      if(isNaN(h)||isNaN(g)) return;
      var id=String(r.id||'');
      var gefDatum=String(r.datum||''), gefWb=String(r.wettbewerb||'');
      if(id.charAt(0)==='S'){
        var a=auftrag.filter(function(x){return x.key===id;})[0];
        if(!a) return;
        var abstand=tageAbstand(a.datum, gefDatum);
        var warn=(abstand!==null && abstand>1);
        /* Urteile per festem Code — nicht von der KI */
        var urteile=[];
        (state.kiProtokoll||[]).forEach(function(e){
          if(a.eintraege.indexOf(e.id)<0) return;
          (e.maerkte||[]).forEach(function(m){
            var ok=marktUrteil(m.code,h,g);
            if(ok===null) return;
            urteile.push({ gehirn:e.herkunft, label:m.label, ok:ok });
          });
        });
        pruefListe.push({ art:'log', id:id, match:a.match, heim:h, gast:g,
          gefDatum:gefDatum, gefWb:gefWb, warn:warn,
          eintraege:a.eintraege, urteile:urteile });
      } else if(id.charAt(0)==='B'){
        var bid=Number(id.slice(1));
        var b=state.bets.filter(function(x){return x.id===bid;})[0];
        if(!b) return;
        pruefListe.push({ art:'bet', id:id, betId:bid, match:b.match, tipp:b.tipp||'', heim:h, gast:g });
      }
    });
    btn.disabled=false; btn.textContent=t('checkBtn');
    if(!pruefListe.length && st){ st.textContent=t('unknown'); }
    render();
  })
  .catch(function(e){
    btn.disabled=false; btn.textContent=t('checkBtn');
    var el=document.getElementById('pruefStatus');
    if(el) el.textContent=(e&&e.message?e.message:'?');
  });
}
function pruefAnwenden(pid){
  var p = pruefListe.filter(function(x){return x.id===pid;})[0];
  if(!p) return;
  if(p.art==='log'){
    (state.kiProtokoll||[]).forEach(function(e){
      if(p.eintraege.indexOf(e.id)<0) return;
      e.ergebnisHeim=p.heim; e.ergebnisGast=p.gast;
      (e.maerkte||[]).forEach(function(m){
        var ok=marktUrteil(m.code,p.heim,p.gast);
        if(ok===null) return;
        m.status = ok ? 'richtig' : 'falsch';
      });
      e.status='bewertet';
    });
    save();
  }
  pruefListe = pruefListe.filter(function(x){return x.id!==pid;});
  render();
}
function pruefIgnorieren(pid){
  pruefListe = pruefListe.filter(function(x){return x.id!==pid;});
  render();
}
function logMarktSet(eid, idx, status){
  (state.kiProtokoll||[]).forEach(function(e){
    if(e.id!==eid) return;
    if(e.maerkte && e.maerkte[idx]) e.maerkte[idx].status=status;
    var offenNoch=(e.maerkte||[]).some(function(m){return m.status==='offen';});
    e.status = offenNoch ? 'offen' : 'bewertet';
  });
  save(); render();
}
function logLoeschen(eid){
  state.kiProtokoll=(state.kiProtokoll||[]).filter(function(e){return e.id!==eid;});
  save(); render();
}
function pruefBlock(){
  var html='';
  html += '<button class="btn btn-ghost" onclick="ergebnissePruefen(this)">'+t('checkBtn')+'</button>';
  html += '<div id="pruefStatus" class="muted" style="color:var(--loss);margin:8px 0"></div>';
  if(pruefListe.length){
    html += '<div class="card" style="border-color:rgba(91,141,239,.4)"><div class="muted" style="margin-bottom:8px">'+t('proposals')+'</div>';
    pruefListe.forEach(function(p){
      html += '<div style="padding:10px 0;border-top:1px solid var(--edge)">'+
        '<div class="flex"><div><b>'+esc(p.match)+'</b>'+
        '<div class="muted">'+t('finalScore')+': <b style="color:var(--accent)">'+p.heim+':'+p.gast+'</b></div></div>'+
        '<div class="score">'+p.heim+':'+p.gast+'</div></div>';
      if(p.art==='log'){
        var quelle = (p.gefDatum||p.gefWb)
          ? '<div class="muted" style="font-size:11.5px;margin:4px 0">'+t('foundAs')+': '+
            esc([p.gefDatum,p.gefWb].filter(Boolean).join(' · '))+'</div>'
          : '';
        var warnung = p.warn
          ? '<div style="font-size:12.5px;color:var(--loss);font-weight:600;margin:4px 0">'+t('dateWarn')+'</div>'
          : '';
        html += quelle + warnung +
        '<div style="margin:6px 0 8px">'+p.urteile.map(function(u){
          var farbe=u.ok?'var(--win)':'var(--loss)';
          var q=(u.gehirn==='flash')?'🌱':'🧠';
          return '<div style="font-size:12.5px;color:var(--dim)">'+q+' '+esc(u.label)+
            ' <span style="color:'+farbe+';font-weight:600">'+(u.ok?'✓':'✗')+'</span></div>';
        }).join('')+'</div>'+
        '<div class="muted" style="font-size:11px;margin-bottom:6px">↳ von der App gerechnet, nicht von der KI</div>'+
        '<div><button class="btn-sm btn-open" onclick="pruefAnwenden(\''+p.id+'\')">'+t('apply')+'</button> '+
        '<button class="btn-sm" onclick="pruefIgnorieren(\''+p.id+'\')">'+t('ignore')+'</button></div>';
      } else {
        html += '<div class="muted" style="margin:6px 0">'+t('tip')+': '+esc(p.tipp)+'</div>'+
        '<div><button class="btn-sm btn-win" onclick="setStatus('+p.betId+',\'gewonnen\');pruefIgnorieren(\''+p.id+'\')">'+t('bWon')+'</button> '+
        '<button class="btn-sm btn-loss" onclick="setStatus('+p.betId+',\'verloren\');pruefIgnorieren(\''+p.id+'\')">'+t('bLost')+'</button> '+
        '<button class="btn-sm" onclick="pruefIgnorieren(\''+p.id+'\')">'+t('ignore')+'</button></div>';
      }
      html += '</div>';
    });
    html += '</div>';
  }
  return html;
}

/* ================= DATENSICHERUNG (v19.1) =================
   Alle Messdaten liegen sonst nur im Browser-Speicher dieses Geraetes. */
function dateiHerunterladen(blob, name){
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url; a.download = name; a.rel = 'noopener';
  document.body.appendChild(a); a.click();
  setTimeout(function(){
    try{ document.body.removeChild(a); }catch(e){}
    URL.revokeObjectURL(url);
  }, 1200);
}
function datenSichern(){
  var daten = JSON.stringify(state);
  var d = new Date();
  var name = 'ondo-control-sicherung-'+d.getFullYear()+'-'+
    ('0'+(d.getMonth()+1)).slice(-2)+'-'+('0'+d.getDate()).slice(-2)+'.json';
  var blob = new Blob([daten], {type:'application/json'});
  state.letzteSicherung = d.toLocaleDateString('de-DE')+' '+
    ('0'+d.getHours()).slice(-2)+':'+('0'+d.getMinutes()).slice(-2);
  try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  var datei = null;
  try{ datei = new File([blob], name, {type:'application/json'}); }catch(e){}
  if(datei && navigator.share && navigator.canShare && navigator.canShare({files:[datei]})){
    navigator.share({ files:[datei], title:name })
      .then(function(){ render(); })
      .catch(function(){ dateiHerunterladen(blob, name); render(); });
    return;
  }
  dateiHerunterladen(blob, name);
  render();
}
function datenLaden(input){
  if(!input.files || !input.files[0]) return;
  var leser = new FileReader();
  leser.onload = function(){
    var d = null;
    try{ d = JSON.parse(leser.result); }catch(e){}
    if(!d || typeof d !== 'object' || (!('kiProtokoll' in d) && !('bets' in d))){
      alert(t('impFail')); input.value=''; return;
    }
    var a = (d.kiProtokoll||[]).length, b = (d.bets||[]).length;
    if(!confirm(t('impConfirm').replace('{a}', a).replace('{b}', b))){ input.value=''; return; }
    for(var k in d) state[k] = d[k];
    save(); render();
    alert(t('impOk'));
    input.value='';
  };
  leser.readAsText(input.files[0]);
}

function pinPruefen(){

function go(x,w){ tab=x; if(w) wtab=w; render(); }

function navUpdate(){
  document.getElementById('nvHome').textContent=t('nvHome');
  document.getElementById('nvBets').textContent=t('nvBets');
  document.getElementById('nvFin').textContent=t('nvFin');
  document.getElementById('nvMore').textContent=t('nvMore');
  document.querySelectorAll('.nav button').forEach(function(el){
    el.classList.toggle('on', el.dataset.tab===tab);
  });

function render(){
  var c=calc(), v=document.getElementById("view");
  document.getElementById("heute").textContent=heuteStr();
  navUpdate();
  if(state.pin && !entsperrt){
    document.getElementById("topSaldo").textContent="🔒";
    document.getElementById("topSaldo").style.color="var(--dim)";
    v.innerHTML=viewLock();
    var pe=document.getElementById('pinEingabe');
    if(pe) pe.addEventListener('keyup',function(e){ if(e.key==='Enter') pinPruefen(); });
    return;
  }
  document.getElementById("topSaldo").textContent=fmt(c.gesamt);
  document.getElementById("topSaldo").style.color = c.gesamt>0?"var(--win)":c.gesamt<0?"var(--loss)":"var(--text)";
  if(tab==="home") v.innerHTML=viewHome(c);
  else if(tab==="wetten") v.innerHTML=viewBets(c);
  else if(tab==="finanzen") v.innerHTML=viewFinance(c);
  else v.innerHTML=viewMore();
}

/* ================= VORHERSAGE-KARTE ================= */
function vorhersageKarte(e, mitKnoepfen){
  var quelle = (e.herkunft==='flash') ? '🌱 Flash' : '🧠 Sonnet';
  var maerkte = (e.maerkte||[]).map(function(m,idx){
    var chip = m.status==='richtig' ? '<span class="badge b-win">'+t('stRight')+'</span>'
             : m.status==='falsch'  ? '<span class="badge b-loss">'+t('stWrong')+'</span>'
             : '<span class="p">'+m.p+' %</span>';
    var knoepfe = (mitKnoepfen && m.status!=='offen')
      ? ' <button class="btn-sm" onclick="logMarktSet(\''+e.id+'\','+idx+',\'offen\')">'+t('reset')+'</button>'
      : (mitKnoepfen
        ? ' <button class="btn-sm btn-win" onclick="logMarktSet(\''+e.id+'\','+idx+',\'richtig\')">✓</button>'+
          ' <button class="btn-sm btn-loss" onclick="logMarktSet(\''+e.id+'\','+idx+',\'falsch\')">✗</button>'
        : '');
    return '<div class="mkt"><div>'+esc(m.label)+
      (m.status!=='offen'?(' <span class="muted">('+m.p+' %)</span>'):'')+'</div>'+
      '<div style="white-space:nowrap">'+chip+knoepfe+'</div></div>';
  }).join('');
  var endstand = (e.ergebnisHeim!==null && e.ergebnisHeim!==undefined)
    ? '<div class="muted" style="margin-top:8px">'+t('finalScore')+': <b style="color:var(--text)">'+e.ergebnisHeim+':'+e.ergebnisGast+'</b></div>'
    : '';
  return '<div class="card">'+
    '<div class="flex"><div>'+
      '<div class="disp" style="font-size:18px">'+esc(e.match)+'</div>'+
      '<div class="muted">'+e.datum+' · '+quelle+(e.wettbewerb?(' · '+esc(e.wettbewerb)):'')+'</div>'+
    '</div><div style="text-align:right">'+
      '<div class="score">'+e.heim+':'+e.gast+'</div>'+
      '<div class="muted" style="font-size:10px">'+t('resultTip')+'</div>'+
    '</div></div>'+
    maerkte+
    (e.begruendung?'<div class="muted" style="margin-top:8px;border-top:1px solid var(--edge);padding-top:8px">'+esc(e.begruendung)+'</div>':'')+
    endstand+
    (mitKnoepfen?'<div style="margin-top:10px"><button class="btn-sm" style="float:right" onclick="logLoeschen(\''+e.id+'\')">'+t('del')+'</button><div style="clear:both"></div></div>':'')+
  '</div>';
}

/* ================= WETTEN ================= */
function viewBets(c){
  var sub='<div class="subtabs">'+
    '<button class="subtab '+(wtab==="vorschlaege"?"on":"")+'" onclick="wtab=\'vorschlaege\';render()">'+t('sugg')+'</button>'+
    '<button class="subtab '+(wtab==="neu"?"on":"")+'" onclick="wtab=\'neu\';render()">'+t('new_')+'</button>'+
    '<button class="subtab '+(wtab==="historie"?"on":"")+'" onclick="wtab=\'historie\';render()">'+t('hist')+'</button>'+
    '<button class="subtab '+(wtab==="kilog"?"on":"")+'" onclick="wtab=\'kilog\';render()">'+t('kiLog')+'</button>'+
  '</div>';

  if(wtab==="vorschlaege"){
    var ids=(state.vorhersagen&&state.vorhersagen.ids)||[];
    var heutige=(state.kiProtokoll||[]).filter(function(e){ return ids.indexOf(e.id)>=0; });
    /* nach Spiel gruppieren, damit beide Gehirne nebeneinander stehen */
    var reihenfolge=[], gruppen={};
    heutige.forEach(function(e){
      if(!gruppen[e.match]){ gruppen[e.match]=[]; reihenfolge.push(e.match); }
      gruppen[e.match].push(e);
    });
    var liste = reihenfolge.map(function(mn){
      return gruppen[mn].map(function(e){ return vorhersageKarte(e,false); }).join('');
    }).join('<div style="height:4px"></div>');
    return sub+
      '<button class="btn" onclick="vorhersagen(this)">'+t('predBtn')+'</button>'+
      '<div id="ladeFehler" class="muted" style="color:var(--loss);margin:10px 0"></div>'+
      '<div class="muted" style="margin:8px 0">'+t('duellD')+'</div>'+
      (state.vorschlaegeInfo?'<div class="muted" style="margin:8px 0">'+esc(state.vorschlaegeInfo)+'</div>':'')+
      (liste||'<div class="card empty">'+t('noPred')+'</div>');
  }

  if(wtab==="neu"){
    return sub+
      '<div class="card">'+
        '<div class="disp" style="font-size:20px;margin-bottom:6px">'+t('photoT')+'</div>'+
        '<div class="muted" style="margin-bottom:10px">'+t('photoD')+'</div>'+
        '<input type="file" accept="image/*" id="fotoInput" style="display:none" onchange="fotoLesen(this)"/>'+
        '<button class="btn" onclick="document.getElementById(\'fotoInput\').click()">'+t('photoBtn')+'</button>'+
        '<div id="fotoStatus" class="muted" style="margin-top:10px"></div>'+
      '</div>'+
      '<div class="card"><div class="grid">'+
      '<div><label>'+t('match')+'</label><input id="f_match" placeholder="Bayern – Dortmund"/></div>'+
      '<div><label>'+t('tip')+'</label><input id="f_tipp"/></div>'+
      '<div style="display:flex;gap:10px">'+
        '<div style="flex:1"><label>'+t('odds')+'</label><input id="f_quote" inputmode="decimal" placeholder="1,85"/></div>'+
        '<div style="flex:1"><label>'+t('stake')+'</label><input id="f_einsatz" inputmode="decimal" placeholder="10"/></div>'+
      '</div>'+
      '<button class="btn" onclick="var m=f_match.value,q=f_quote.value,e=f_einsatz.value; if(m&&q&&e){addBet({match:m,tipp:f_tipp.value,quote:q},e);}else{alert(\''+t('fillAll')+'\');}">'+t('saveBet')+'</button>'+
    '</div></div>';
  }

  if(wtab==="kilog"){
    var pl=(state.kiProtokoll||[]);
    var neu=pl.filter(function(e){ return e.aera==='v19'; });
    var alt=pl.filter(function(e){ return e.aera!=='v19'; });
    var eintraege = neu.length ? neu.map(function(e){ return vorhersageKarte(e,true); }).join('')
      : '<div class="card empty">'+t('logEmpty')+'</div>';
    var archiv = alt.length
      ? '<div class="muted" style="margin:18px 0 8px;letter-spacing:1px;text-transform:uppercase">'+t('archive')+'</div>'+
        '<div class="muted" style="margin-bottom:10px">'+t('archiveD')+'</div>'+
        alt.map(function(e){
          var chip = e.status==='richtig' ? '<span class="badge b-win">'+t('stRight')+'</span>'
            : e.status==='falsch' ? '<span class="badge b-loss">'+t('stWrong')+'</span>'
            : '<span class="badge b-open">'+t('openB')+'</span>';
          var quelle = (e.herkunft==='flash') ? ' · 🌱 Flash' : ' · 🧠 Sonnet';
          return '<div class="card" style="opacity:.65"><div class="flex"><div>'+
            '<div class="disp" style="font-size:16px">'+esc(e.match)+'</div>'+
            '<div class="muted">'+e.datum+' · '+t('tip')+': '+esc(e.tipp||'?')+' · '+t('odds')+' '+esc(e.quote||'?')+quelle+'</div>'+
            '</div>'+chip+'</div></div>';
        }).join('')
      : '';
    return sub+'<div class="muted" style="margin-bottom:10px">'+t('logD')+'</div>'+pruefBlock()+eintraege+archiv;
  }

  if(wtab==="historie" && !state.bets.length) return sub+pruefBlock()+'<div class="card empty">'+t('noBets')+'</div>';
  var h=state.bets.map(function(b){
    var badge = b.status==="offen"?'<span class="badge b-open">'+t('openB')+'</span>':
                b.status==="gewonnen"?'<span class="badge b-win">'+t('won')+'</span>':
                '<span class="badge b-loss">'+t('lost')+'</span>';
    var akt = b.status==="offen"
      ? '<button class="btn-sm btn-win" onclick="setStatus('+b.id+',\'gewonnen\')">'+t('bWon')+'</button> '+
        '<button class="btn-sm btn-loss" onclick="setStatus('+b.id+',\'verloren\')">'+t('bLost')+'</button>'
      : '<button class="btn-sm" onclick="setStatus('+b.id+',\'offen\')">'+t('reset')+'</button>';
    var pnl = b.status!=="offen"
      ? '<div style="color:'+(profit(b)>=0?"var(--win)":"var(--loss)")+';font-weight:600;margin-top:2px">'+fmt(profit(b))+'</div>'
      : '<div class="muted">'+t('possWin')+': <span style="color:var(--win)">'+fmt(b.einsatz*(b.quote-1))+'</span></div>';
    return '<div class="card">'+
      '<div class="flex"><div><div class="disp" style="font-size:19px">'+esc(b.match)+'</div>'+
      '<div class="muted">'+b.datum+' · '+t('odds')+' '+b.quote.toLocaleString("de-DE")+' · '+t('stake').replace(' (€)','')+' '+eur(b.einsatz)+'</div></div>'+badge+'</div>'+
      (b.tipp?'<div style="font-size:13px;margin-top:8px">'+t('tip')+': '+esc(b.tipp)+'</div>':'')+pnl+
      '<div style="margin-top:12px">'+akt+
      ' <button class="btn-sm" style="float:right" onclick="delBet('+b.id+')">'+t('del')+'</button></div>'+
    '</div>';
  }).join("");
  return sub+pruefBlock()+h;
}

/* ================= KALIBRIERUNGS-ANZEIGE ================= */
function kalibBlock(){
  function tabelle(k, titel){
    if(!k) return '<div class="muted">'+titel+': '+t('calibNone')+'</div>';
    var kopf='<div style="margin-top:10px"><b>'+titel+'</b> · '+t('calibDev')+': '+
      '<span style="color:'+(k.abw<=10?'var(--win)':(k.abw<=20?'var(--accent)':'var(--loss)'))+';font-weight:700">'+k.abw+' %</span>'+
      ' <span class="muted">('+k.gesamt+' '+t('calibPts')+')</span></div>';
    var rows=k.zeilen.map(function(z){
      return '<tr><td>'+z.von+'–'+z.bis+' %</td><td>'+z.behauptet+' %</td><td>'+z.echt+' %</td><td>'+z.n+'</td></tr>';
    }).join('');
    return kopf+'<table class="ktab"><tr><th>'+t('calibBand')+'</th><th>'+t('calibClaim')+'</th><th>'+t('calibReal')+'</th><th>'+t('calibN')+'</th></tr>'+rows+'</table>';
  }
  return '<div class="card">'+
    '<div class="disp" style="font-size:20px;margin-bottom:6px">🎯 '+t('calib')+'</div>'+
    '<div class="muted">'+t('calibD')+'</div>'+
    tabelle(calcKalibrierung('sonnet'),'🧠 Sonnet')+
    tabelle(calcKalibrierung('flash'),'🌱 Flash')+
  '</div>';
}
