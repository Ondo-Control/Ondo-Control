<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="theme-color" content="#0B1220" />
<title>Ondo Control</title>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>
<style>
  :root{
    --bg:#0B1220; --card:#111C30; --edge:#1D2B45; --inner:#0D1729;
    --text:#E8EDF4; --dim:#8A98AF; --accent:#F5D90A;
    --win:#2FBF71; --loss:#E5484D; --open:#5B8DEF;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0;background:var(--bg);color:var(--text);
    font-family:'Inter',-apple-system,'Segoe UI',sans-serif;}
  .wrap{max-width:700px;margin:0 auto;padding:calc(18px + env(safe-area-inset-top)) 14px 110px;}
  h1{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;
    font-size:34px;margin:0;letter-spacing:1px;text-transform:uppercase;}
  h1 .a{color:var(--accent);}
  .disp{font-family:'Barlow Condensed','Arial Narrow',sans-serif;font-weight:700;}
  .sub{color:var(--dim);font-size:12px;margin:2px 0 16px;}
  .card{background:var(--card);border:1px solid var(--edge);border-radius:12px;padding:15px;margin-bottom:12px;}
  .stat-label{color:var(--dim);font-size:12px;margin-bottom:4px;}
  .stat-val{font-family:'Barlow Condensed',sans-serif;font-size:30px;font-weight:700;line-height:1;}
  .stat-sub{color:var(--dim);font-size:11px;margin-top:4px;}
  .row{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:10px;}
  .row>.card{flex:1;min-width:135px;margin-bottom:0;}
  label{font-size:12px;color:var(--dim);display:block;margin-bottom:4px;}
  input,select{width:100%;background:var(--inner);border:1px solid var(--edge);
    border-radius:8px;color:var(--text);padding:11px 12px;font-size:15px;outline:none;
    font-family:inherit;}
  select{appearance:none;-webkit-appearance:none;}
  .btn{background:var(--accent);color:#0B1220;border:none;border-radius:9px;padding:12px 16px;
    font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;letter-spacing:1px;
    cursor:pointer;text-transform:uppercase;width:100%;}
  .btn:disabled{background:#2A3550;color:var(--dim);}
  .btn-ghost{background:transparent;border:1px solid var(--edge);color:var(--dim);}
  .btn-sm{background:transparent;border:1px solid var(--dim);color:var(--dim);border-radius:6px;
    padding:6px 12px;font-size:12px;cursor:pointer;font-family:inherit;width:auto;}
  .btn-win{border-color:var(--win);color:var(--win);}
  .btn-loss{border-color:var(--loss);color:var(--loss);}
  .btn-open{border-color:var(--open);color:var(--open);}
  .badge{font-family:'Barlow Condensed',sans-serif;font-size:13px;letter-spacing:1.2px;
    padding:3px 10px;border-radius:4px;font-weight:600;}
  .b-open{background:#16233C;color:var(--open);}
  .b-win{background:#0F2A1D;color:var(--win);}
  .b-loss{background:#2C1417;color:var(--loss);}
  .grid{display:grid;gap:12px;}
  .muted{color:var(--dim);font-size:12px;line-height:1.5;}
  .empty{padding:26px;text-align:center;color:var(--dim);font-size:14px;}
  .flex{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;}
  .save-note{color:var(--accent);font-size:12px;margin-left:8px;}
  .quote{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700;color:var(--accent);}
  .tipbox{background:var(--inner);border-radius:8px;padding:10px 12px;margin-top:10px;}
  pre{white-space:pre-wrap;font-family:inherit;font-size:13px;line-height:1.65;margin:0;}
  .subtabs{display:flex;gap:5px;background:var(--card);border:1px solid var(--edge);
    border-radius:10px;padding:5px;margin-bottom:16px;}
  .subtab{flex:1;padding:9px 2px;background:transparent;color:var(--dim);border:none;
    border-radius:8px;font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;
    letter-spacing:.8px;cursor:pointer;text-transform:uppercase;white-space:nowrap;}
  .subtab.on{background:var(--accent);color:#0B1220;}
  .module{display:flex;justify-content:space-between;align-items:center;cursor:pointer;}
  .module .mi{font-size:26px;margin-right:12px;}
  .module .mt{font-family:'Barlow Condensed',sans-serif;font-size:19px;font-weight:700;}
  .module .md{color:var(--dim);font-size:12px;}
  .mstatus{font-family:'Barlow Condensed',sans-serif;font-size:12px;letter-spacing:1.2px;font-weight:700;}
  /* Bottom-Navigation */
  .nav{position:fixed;bottom:0;left:0;right:0;background:rgba(13,23,41,.97);
    border-top:1px solid var(--edge);display:flex;z-index:50;
    padding:8px 6px calc(8px + env(safe-area-inset-bottom));backdrop-filter:blur(10px);}
  .nav button{flex:1;background:none;border:none;color:var(--dim);cursor:pointer;
    font-family:inherit;font-size:10.5px;display:flex;flex-direction:column;align-items:center;gap:3px;}
  .nav button .ic{font-size:22px;line-height:1;}
  .nav button.on{color:var(--accent);}
</style>
</head>
<body>
<div id="updateBar" style="display:none;position:fixed;top:0;left:0;right:0;z-index:100;
  background:var(--accent);color:#0B1220;
  padding:calc(10px + env(safe-area-inset-top)) 14px 10px;
  align-items:center;justify-content:space-between;gap:10px;
  font-size:14px;font-weight:600;">
  <span>🔄 Update verfügbar / Mise à jour dispo / Update available</span>
  <button style="background:#0B1220;color:var(--accent);border:none;border-radius:8px;padding:8px 14px;
    font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:700;letter-spacing:1px;cursor:pointer;
    text-transform:uppercase;">Aktualisieren</button>
</div>
<div class="wrap">
  <div class="flex" style="align-items:baseline;">
    <h1>Ondo<span class="a"> Control</span></h1>
    <div id="topSaldo" class="disp" style="font-size:21px;">+0,00 €</div>
  </div>
  <div class="sub"><span id="heute"></span> · v18.3 BETA<span id="saveNote" class="save-note"></span></div>
  <div id="view"></div>
</div>

<div class="nav" id="nav">
  <button data-tab="home"><span class="ic">🏠</span><span id="nvHome">Start</span></button>
  <button data-tab="wetten"><span class="ic">🎯</span><span id="nvBets">Wetten</span></button>
  <button data-tab="finanzen"><span class="ic">💰</span><span id="nvFin">Finanzen</span></button>
  <button data-tab="mehr"><span class="ic">⚙️</span><span id="nvMore">Mehr</span></button>
</div>

/* ================= VERSION & UPDATE-CHECK ================= */
var APP_VERSION = 18;
function checkUpdate(){
  fetch('version.json?ts='+Date.now(),{cache:'no-store'})
    .then(function(r){ return r.json(); })
    .then(function(j){
      if(j && Number(j.v) > APP_VERSION){
        var bar=document.getElementById('updateBar');
        if(bar){
          bar.style.display='flex';
          bar.querySelector('button').onclick=function(){
            location.href='OndoControl.html?u='+Number(j.v)+'x'+Date.now();
          };
        }
      }
    })
    .catch(function(e){ /* offline oder Datei fehlt: still bleiben */ });
}

  bets: [],
  regeln: { maxEinsatz: 20 },
  startSaldo: -10.24,
  eingezahlt: 30,
  ausgezahlt: 0,
  lang: 'de',
  vorschlaege: [],
  vorschlaegeInfo: "",
  kiProtokoll: [],
  verworfen: []
};

function load(){
  try{
    var raw = localStorage.getItem(KEY);
    if(raw){ var d = JSON.parse(raw); for(var k in d) state[k]=d[k];
      if(!state.regeln) state.regeln={maxEinsatz:20}; }
  }catch(e){}
  if(!state.seedV || state.seedV < 2){
    var seedBets = [
      {id:900001, datum:"4.7.2026", match:"Kanada – Marokko", tipp:"Beide Teams treffen (Ja)", quote:2.05, einsatz:7, status:"verloren", claudeRichtig:false},
      {id:900002, datum:"4.7.2026", match:"Paraguay – Frankreich", tipp:"Frankreich über 2,5 Tore", quote:1.75, einsatz:7, status:"verloren", claudeRichtig:false},
      {id:900003, datum:"5.7.2026", match:"6er Kombi (Bra, Eng, Spa, USA, Arg, Kol)", tipp:"Alle 6 Siege", quote:62.0, einsatz:3.95, status:"offen", claudeRichtig:null},
      {id:900004, datum:"5.7.2026", match:"7er Kombi (Weiterkommen: Bra, Eng, Spa, USA, Arg, Kol, Fra)", tipp:"Alle 7 kommen weiter", quote:14.3, einsatz:2, status:"offen", claudeRichtig:null},
      {id:900005, datum:"5.7.2026", match:"7er Kombi (Weiterkommen + 2× Über 1,5)", tipp:"Alle 7 richtig", quote:13.08, einsatz:1, status:"offen", claudeRichtig:null}
    ];
    for(var i=0;i<seedBets.length;i++){
      var exists=false;
      for(var j=0;j<state.bets.length;j++){ if(state.bets[j].id===seedBets[i].id){ exists=true; break; } }
      if(!exists) state.bets.push(seedBets[i]);
    }
    state.bets.sort(function(a,b){ return b.id-a.id; });
    state.seedV = 2;
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  }
  if(state.seedV < 3){
    for(var m=0;m<state.bets.length;m++){
      if(state.bets[m].id===900001){ state.bets[m].quote=1.90; }
      if(state.bets[m].id===900002){
        state.bets[m].einsatz=5.81;
        state.bets[m].tipp="Frankreich über 2,5 Tore (Cashout: 1,19 € zurückgeholt)";
      }
    }
    state.seedV = 3;
    try{ localStorage.setItem(KEY, JSON.stringify(state)); }catch(e){}
  }
}
function save(){
  try{
    localStorage.setItem(KEY, JSON.stringify(state));
    note(t('saved'));
  }catch(e){ note(t('saveFail')); }
}
function note(x){
  var n=document.getElementById("saveNote"); n.textContent=x;
  setTimeout(function(){ n.textContent=""; }, 1500);
}

/* ================= HELFER ================= */
function eur(n){ return n.toLocaleString("de-DE",{minimumFractionDigits:2,maximumFractionDigits:2})+" €"; }
function fmt(n){ return (n>=0?"+":"")+eur(n); }
function profit(b){
  if(b.status==="gewonnen") return b.einsatz*(b.quote-1);
  if(b.status==="verloren") return -b.einsatz;
  return 0;
}
function heuteStr(){
  var loc = state.lang==='fr'?'fr-FR':(state.lang==='en'?'en-GB':'de-DE');
  return new Date().toLocaleDateString(loc,{weekday:"long",day:"numeric",month:"long",year:"numeric"});
}

/* ================= BERECHNUNG ================= */
function calc(){
  var done = state.bets.filter(function(b){return b.status!=="offen";});
  var wins = done.filter(function(b){return b.status==="gewonnen";}).length;
  var wettSaldo = done.reduce(function(s,b){return s+profit(b);},0);
  var offen = state.bets.filter(function(b){return b.status==="offen";})
                        .reduce(function(s,b){return s+b.einsatz;},0);
  var gesamt = wettSaldo + state.startSaldo;
  return {
    done:done.length, wins:wins, wettSaldo:wettSaldo, offen:offen,
    gesamt:gesamt, tipico: state.eingezahlt + gesamt - offen - (state.ausgezahlt||0),
    quoteIch: done.length? Math.round(wins/done.length*100):null
  };
}
function calcAI(){
  var bew = state.bets.filter(function(b){return b.claudeRichtig!==null;});
  var p = (state.kiProtokoll||[]).filter(function(e){return e.status==='richtig'||e.status==='falsch';});
  function zaehl(quelle){
    var b2 = bew.filter(function(b){ return (b.herkunft||'sonnet')===quelle; });
    var p2 = p.filter(function(e){ return (e.herkunft||'sonnet')===quelle; });
    var n = b2.length + p2.length;
    var tr = b2.filter(function(b){return b.claudeRichtig;}).length +
             p2.filter(function(e){return e.status==='richtig';}).length;
    return { n:n, tr:tr, q: n? Math.round(tr/n*100):null };
  }
  var s = zaehl('sonnet'), f = zaehl('flash');
  var n = s.n + f.n, treffer = s.tr + f.tr;
  return { n:n, tr:treffer, q: n? Math.round(treffer/n*100):null, sonnet:s, flash:f };
}

/* ================= BRAIN-ADAPTER (Ondo Core Architektur Punkt 0) ================= */
// Modell-Kaskade: probiert aktuelle Modellnamen durch und merkt sich das funktionierende
var GEMINI_MODELS = ['gemini-flash-latest','gemini-3.5-flash','gemini-3-flash','gemini-2.5-flash'];
function geminiCall(opts, modellIndex){
  // opts: { prompt, useSearch, imageB64 }
  var modell = state.geminiModel || GEMINI_MODELS[modellIndex||0];
  var parts = [];
  if(opts.imageB64) parts.push({ inlineData:{ mimeType:'image/jpeg', data:opts.imageB64 } });
  parts.push({ text: opts.prompt });
  var body = { contents:[{ parts: parts }] };
  if(opts.useSearch) body.tools = [{ google_search: {} }];
  return fetch('https://generativelanguage.googleapis.com/v1beta/models/'+modell+':generateContent?key='+encodeURIComponent(state.geminiKey),{
    method:'POST',
    headers:{ 'content-type':'application/json' },
    body: JSON.stringify(body)
  }).then(function(r){ return r.json().then(function(j){ j._status=r.status; return j; }); })
  .then(function(res){
    if(res.error){
      var msg = res.error.message || String(res._status);
      var modellProblem = res._status===404 || /no longer available|not found|not supported/i.test(msg);
      var ueberlastet = res._status===503 || res._status===429 || /high demand|overloaded|try again/i.test(msg);
      var idx = (modellIndex||0);
      if(modellProblem || ueberlastet){
        if(modellProblem) state.geminiModel = null; // nicht existierendes Modell verwerfen
        if(idx < GEMINI_MODELS.length-1){
          // bei Ueberlastung: gemerktes Modell behalten, aber Ausweichmodell probieren
          return geminiCall(opts, idx+1);
        }
      }
      return { error:{ message:'Gemini ('+modell+'): '+msg }, _status:res._status };
    }
    try{
      var txt = (res.candidates[0].content.parts||[]).map(function(p){return p.text||'';}).join('\n');
      if(!state.geminiModel){ state.geminiModel = modell; save(); } // funktionierendes Modell merken
      return { content:[{ type:'text', text:txt }], stop_reason:'end_turn', _status:res._status };
    }catch(e){
      return { error:{ message:'Gemini ('+modell+'): Antwort nicht lesbar' }, _status:500 };
    }
  });
}
function hatGemini(){ return !!(state.geminiKey && state.geminiKey.length > 20); }

/* ================= API-HELFER (Anthropic) ================= */
function apiCall(body){
  return fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{
      'x-api-key':state.apiKey,
      'anthropic-version':'2023-06-01',
      'content-type':'application/json',
      'anthropic-dangerous-direct-browser-access':'true'
    },
    body:JSON.stringify(body)
  }).then(function(r){ return r.json().then(function(j){ j._status=r.status; return j; }); });
}
function parseJsonBlock(res){
  var texte=(res.content||[]).filter(function(b){return b.type==='text';}).map(function(b){return b.text;});
  var parsed=null;
  for(var i=texte.length-1;i>=0 && !parsed;i--){
    var c=texte[i].replace(/```json|```/g,'').trim();
    var s=c.indexOf('{'), e=c.lastIndexOf('}');
    if(s===-1||e===-1) continue;
    try{ parsed=JSON.parse(c.slice(s,e+1)); }catch(x){}
  }
  return parsed;
}

/* ================= KI-ANALYSE ================= */
function kiAnalyse(btn, versuch){
  var nutzeGoogle = (state.analyseProvider==='google' && hatGemini());
  if(!nutzeGoogle && (!state.apiKey || state.apiKey.indexOf('sk-ant-')!==0)){
    var f0=document.getElementById('ladeFehler');
    if(f0) f0.textContent=t('noKey');
    return;
  }
  btn.disabled=true; btn.textContent=t('kiThink');
  var f=document.getElementById('ladeFehler'); if(f) f.textContent='';

  var gehirn = (state.analyseProvider==='google' && hatGemini()) ? 'flash' : 'sonnet';
  var fruehere = (state.kiProtokoll||[]).filter(function(e){
    return !e.herkunft || e.herkunft===gehirn;
  }).slice(0,6).map(function(e){
    return e.datum+': '+e.match+' -> '+(e.tipp||'?')+' (Quote '+(e.quote||'?')+', '+e.status+')';
  }).join('; ');
  var prompt='Heute ist '+heuteStr()+'. Du bist der Wett-Analyst von Ondo Control: Fakten von Annahmen trennen, mehrere Quellen pruefen, Risiken ehrlich nennen, keine Scheinsicherheit, keine Gewinnversprechen.\n\nSuche im Web, welche Fussballspiele HEUTE und MORGEN wirklich stattfinden (echte Teamnamen!) und die aktuellen Wettquoten.\n\nWaehle 0 bis 3 Spiele mit ECHTEM Value (deine geschaetzte Wahrscheinlichkeit mal Quote klar ueber 1). WICHTIG: Lieber weniger oder GAR KEINE Tipps als schwache — es gibt KEINE Pflicht, 3 zu liefern. Quoten unter 1.30 sind fast nie Value. Pro Spiel: konkreter Tipp, realistische Quote als Zahl, empfohlener Einsatz zwischen 5 und '+state.regeln.maxEinsatz+' Euro, sehr kurze Begruendung (max 20 Woerter, inkl. Risiko) auf '+(LANGWORD[state.lang]||'Deutsch')+'.\n\n'+(fruehere?('KONSISTENZ — deine bisherigen Empfehlungen: '+fruehere+'. Wenn du heute bei einem dieser Spiele anders tippst als zuvor, MUSST du das in der Begruendung ausdruecklich benennen ("Aenderung: ..." + Grund). Grundlos die Seite wechseln ist verboten.\n\n'):'')+'Nenne zusaetzlich kurz die geprueften Spiele OHNE Value (max 5, Grund in max 6 Woertern).\n\nLetzte Nachricht: NUR kompaktes JSON (spiele darf leer sein):\n{"spiele":[{"match":"Team A - Team B","wettbewerb":"...","anpfiff":"...","tipp":"...","quote":1.85,"einsatz":10,"begruendung":"..."}],"verworfen":[{"spiel":"...","grund":"..."}]}';

  var messages=[{role:'user',content:prompt}];
  var runden=0;
  function weiter(res){
    if(res._status===401) throw new Error(t('keyBad'));
    if(res._status===400 && res.error && /credit/i.test(res.error.message||'')) throw new Error(t('credEmpty'));
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    if(res.stop_reason==='pause_turn' && runden<3){
      runden++;
      messages.push({role:'assistant',content:res.content});
      return apiCall({model:'claude-sonnet-4-6',max_tokens:2500,messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search',max_uses:5}]}).then(weiter);
    }
    var parsed=parseJsonBlock(res);
    if(!parsed || !parsed.spiele) throw new Error(t('noJson'));
    if(!parsed.spiele.length){
      state.vorschlaege=[];
      state.verworfen=(parsed.verworfen||[]).map(function(x){return {spiel:String(x.spiel||''),grund:String(x.grund||'')};});
      state.vorschlaegeInfo=t('kiOf')+': '+heuteStr()+' — '+t('noValueToday');
      save();
      btn.disabled=false; btn.textContent=t('kiBtn');
      render();
      return;
    }
    state.vorschlaege=parsed.spiele.map(function(sp,idx){
      return {
        id:'ki'+Date.now()+idx,
        match:String(sp.match||''),
        wettbewerb:String(sp.wettbewerb||''),
        anpfiff:String(sp.anpfiff||''),
        tipp:String(sp.tipp||''),
        quote:String(sp.quote||''),
        einsatz:String(Math.min(Number(sp.einsatz)||10,state.regeln.maxEinsatz)),
        info:String(sp.begruendung||'')+' — '+t('kiNote')
      };
    });
    state.verworfen=(parsed.verworfen||[]).map(function(x){return {spiel:String(x.spiel||''),grund:String(x.grund||'')};});
    // KI-Tipp-Protokoll: jede Empfehlung automatisch festhalten
    if(!state.kiProtokoll) state.kiProtokoll=[];
    state.vorschlaege.forEach(function(v){
      v.herkunft = gehirn;
      state.kiProtokoll.unshift({ id:'p'+v.id, datum:new Date().toLocaleDateString('de-DE'),
        match:v.match, tipp:v.tipp, quote:v.quote, status:'offen', herkunft:gehirn });
    });
    state.vorschlaegeInfo=t('kiOf')+': '+heuteStr();
    save();
    btn.disabled=false; btn.textContent=t('kiBtn');
    render();
  }
  var startCall = (state.analyseProvider==='google' && hatGemini())
    ? geminiCall({ prompt: prompt, useSearch: true })
    : apiCall({model:'claude-sonnet-4-6',max_tokens:2500,messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search',max_uses:5}]});
  startCall.then(weiter)
  .catch(function(e){
    if(!versuch){
      // Automatischer zweiter Versuch (z.B. bei abgeschnittenem JSON)
      setTimeout(function(){ kiAnalyse(btn, 2); }, 1200);
      return;
    }
    btn.disabled=false; btn.textContent=t('kiBtn');
    var el=document.getElementById('ladeFehler');
    if(el) el.textContent=(e&&e.message?e.message:'?');
  });
}

/* ================= SPIELPLAN (freie Quelle) ================= */
function spieleLaden(btn){
  btn.disabled=true;
  var f=document.getElementById("ladeFehler"); if(f) f.textContent="";
  fetch("https://www.thestatsapi.com/world-cup/data/fixtures.json")
    .then(function(r){ if(!r.ok) throw new Error("HTTP "+r.status); return r.json(); })
    .then(function(data){
      var heute0 = new Date(); heute0.setHours(0,0,0,0);
      var kommende = (data.fixtures||[])
        .filter(function(m){ return new Date(m.kickoffUtc) >= heute0; })
        .sort(function(a,b){ return new Date(a.kickoffUtc)-new Date(b.kickoffUtc); })
        .slice(0,5);
      if(!kommende.length) throw new Error("0 games");
      state.vorschlaege = kommende.map(function(m,idx){
        return {
          id:"f"+Date.now()+idx,
          match:m.homeTeam+" – "+m.awayTeam,
          wettbewerb:"WM 2026 · "+(m.stage||"").replace(/-/g," "),
          anpfiff:new Date(m.kickoffUtc).toLocaleString("de-DE",{weekday:"short",day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}),
          tipp:"", quote:"", einsatz:"",
          info:t('teamsTbd')
        };
      });
      state.vorschlaegeInfo = t('planLoaded')+": "+heuteStr();
      save(); btn.disabled=false; render();
    })
    .catch(function(e){
      btn.disabled=false;
      var el=document.getElementById("ladeFehler");
      if(el) el.textContent=t('loadFail')+" ("+(e&&e.message?e.message:"?")+"). "+t('loadHand');
    });
}

/* ================= SCHEIN-FOTO ================= */
function fotoLesen(input){
  if(!input.files || !input.files[0]) return;
  if(!hatGemini() && (!state.apiKey || state.apiKey.indexOf('sk-ant-')!==0)){
    var f0=document.getElementById('fotoStatus');
    if(f0) f0.textContent=t('noKey');
    return;
  }
  var st=document.getElementById('fotoStatus');
  if(st) st.textContent=t('photoRead');
  var reader=new FileReader();
  reader.onload=function(){
    var img=new Image();
    img.onload=function(){
      var max=1200, w=img.width, h=img.height;
      if(w>max){ h=Math.round(h*max/w); w=max; }
      var cv=document.createElement('canvas'); cv.width=w; cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      var b64=cv.toDataURL('image/jpeg',0.8).split(',')[1];
      var fotoPrompt='Das ist ein Foto eines Wettscheins (z.B. Tipico). Lies ihn exakt. Bei einer Kombi: EIN Eintrag, Gesamtquote = Moeglicher Gewinn geteilt durch Einsatz (2 Dezimalen). Bei Einzelwetten: ein Eintrag pro Wette. Status: VERLOREN -> verloren, GEWONNEN -> gewonnen, sonst offen. NUR kompaktes JSON: {"wetten":[{"match":"...","tipp":"...","quote":2.05,"einsatz":7,"status":"offen"}]}';
      var fotoCall = hatGemini()
        ? geminiCall({ prompt: fotoPrompt, imageB64: b64 })
        : apiCall({model:'claude-sonnet-4-6',max_tokens:800,
            messages:[{role:'user',content:[
              {type:'image',source:{type:'base64',media_type:'image/jpeg',data:b64}},
              {type:'text',text:fotoPrompt}
            ]}]
          });
      fotoCall.then(function(res){
        if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
        var parsed=parseJsonBlock(res);
        if(!parsed || !parsed.wetten || !parsed.wetten.length) throw new Error(t('noJson'));
        var n=0;
        parsed.wetten.forEach(function(w,idx){
          state.bets.unshift({
            id:Date.now()+idx,
            datum:new Date().toLocaleDateString('de-DE'),
            match:String(w.match||'?'),
            tipp:String(w.tipp||''),
            quote:Number(w.quote)||0,
            einsatz:Number(w.einsatz)||0,
            status:(w.status==='gewonnen'||w.status==='verloren')?w.status:'offen',
            claudeRichtig:null
          });
          n++;
        });
        save();
        if(st) st.textContent='✅ '+n+' '+t('photoOk');
        setTimeout(function(){ go('wetten','historie'); },800);
      })
      .catch(function(e){
        if(st) st.textContent=t('photoFail')+(e&&e.message?e.message:'?');
      });
    };
    img.src=reader.result;
  };
  reader.readAsDataURL(input.files[0]);
}

/* ================= ERGEBNISSE PRUEFEN ================= */
var pruefListe = [];
function ergebnissePruefen(btn){
  if(!hatGemini() && (!state.apiKey || state.apiKey.indexOf('sk-ant-')!==0)){
    var f0=document.getElementById('pruefStatus'); if(f0) f0.textContent=t('noKey'); return;
  }
  var offeneBets = state.bets.filter(function(b){return b.status==='offen';})
    .map(function(b){return {id:'B'+b.id, beschreibung:b.match+' | Tipp: '+(b.tipp||'?')};});
  var offeneP = (state.kiProtokoll||[]).filter(function(e){return e.status==='offen';})
    .map(function(e){return {id:'P'+e.id, beschreibung:e.match+' | Tipp: '+(e.tipp||'?')+' | vom '+e.datum};});
  var alle = offeneBets.concat(offeneP);
  var st=document.getElementById('pruefStatus');
  if(!alle.length){ if(st) st.textContent=t('noOpen'); return; }
  btn.disabled=true; btn.textContent=t('checking');
  if(st) st.textContent='';
  var prompt='Heute ist '+heuteStr()+'. Pruefe per Websuche die folgenden Wett-Tipps: Ist jeder Tipp AUFGEGANGEN (gewonnen), NICHT aufgegangen (verloren) oder noch nicht entschieden/unklar (unbekannt)? Bei Kombis: NUR gewonnen wenn ALLE Teile stimmen.\n\n'+
    alle.map(function(a){return a.id+': '+a.beschreibung;}).join('\n')+
    '\n\nLetzte Nachricht: NUR kompaktes JSON:\n{"ergebnisse":[{"id":"B123","ausgang":"gewonnen|verloren|unbekannt","info":"max 8 Woerter"}]}';
  var messages=[{role:'user',content:prompt}];
  var runden=0;
  function weiter(res){
    if(res._status===401) throw new Error(t('keyBad'));
    if(res.error) throw new Error(res.error.message||('HTTP '+res._status));
    if(res.stop_reason==='pause_turn' && runden<3){
      runden++;
      messages.push({role:'assistant',content:res.content});
      return apiCall({model:'claude-sonnet-4-6',max_tokens:1200,messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search',max_uses:3}]}).then(weiter);
    }
    var parsed=parseJsonBlock(res);
    if(!parsed || !parsed.ergebnisse) throw new Error(t('noJson'));
    pruefListe = parsed.ergebnisse.filter(function(e){return e.ausgang==='gewonnen'||e.ausgang==='verloren';})
      .map(function(e){return {id:String(e.id), ausgang:e.ausgang, info:String(e.info||'')};});
    btn.disabled=false; btn.textContent=t('checkBtn');
    if(!pruefListe.length && st){ st.textContent=t('unknown'); }
    render();
  }
  var startPr = hatGemini()
    ? geminiCall({ prompt: prompt, useSearch: true })
    : apiCall({model:'claude-sonnet-4-6',max_tokens:1200,messages:messages,
        tools:[{type:'web_search_20250305',name:'web_search',max_uses:3}]});
  startPr.then(weiter)
  .catch(function(e){
    btn.disabled=false; btn.textContent=t('checkBtn');
    var el=document.getElementById('pruefStatus');
    if(el) el.textContent=(e&&e.message?e.message:'?');
  });
}
function pruefAnwenden(pid){
  var p = pruefListe.find(function(x){return x.id===pid;});
  if(!p) return;
  if(pid.charAt(0)==='B'){
    var bid=Number(pid.slice(1));
    setStatus(bid, p.ausgang);
  } else {
    var eid=pid.slice(1);
    (state.kiProtokoll||[]).forEach(function(e){
      if(e.id===eid) e.status = (p.ausgang==='gewonnen') ? 'richtig' : 'falsch';
    });
    save();
  }
  pruefListe = pruefListe.filter(function(x){return x.id!==pid;});
  render();
}
function pruefIgnorieren(pid){
  pruefListe = pruefListe.filter(function(x){return x.id!==pid;});
  render();
}
function pruefBlock(){
  var html='';
  html += '<button class="btn btn-ghost" onclick="ergebnissePruefen(this)">'+t('checkBtn')+'</button>';
  html += '<div id="pruefStatus" class="muted" style="color:var(--loss);margin:8px 0"></div>';
  if(pruefListe.length){
    html += '<div class="card" style="border-color:rgba(91,141,239,.4)"><div class="muted" style="margin-bottom:8px">'+t('proposals')+'</div>';
    pruefListe.forEach(function(p){
      var farbe = p.ausgang==='gewonnen' ? 'var(--win)' : 'var(--loss)';
      html += '<div style="display:flex;justify-content:space-between;align-items:center;gap:8px;padding:8px 0;border-top:1px solid var(--edge)">'+

        '<div style="white-space:nowrap"><button class="btn-sm btn-open" onclick="pruefAnwenden(\''+p.id+'\')">'+t('apply')+'</button> '+
        '<button class="btn-sm" onclick="pruefIgnorieren(\''+p.id+'\')">'+t('ignore')+'</button></div>'+
      '</div>';
    });

}

/* ================= AKTIONEN ================= */
function addBet(v, einsatzVal){
  var einsatz = Math.min(parseFloat(String(einsatzVal).replace(",","."))||0, state.regeln.maxEinsatz);
  var fromKI = !!(v.id && String(v.id).indexOf('ki')===0);
  state.bets.unshift({
    id:Date.now(), datum:new Date().toLocaleDateString("de-DE"),
    match:v.match, tipp:v.tipp||"", quote:parseFloat(String(v.quote).replace(",","."))||0,
    einsatz:einsatz, status:"offen", claudeRichtig:null, fromKI:fromKI, herkunft:v.herkunft||null
  });
  if(fromKI && state.kiProtokoll){
    state.kiProtokoll.forEach(function(e){ if(e.id==='p'+v.id) e.status='uebernommen'; });
  }
  save(); go("wetten","historie");
}
function setStatus(id,s){
  state.bets.forEach(function(b){
    if(b.id===id){
      b.status=s;
      if(b.fromKI){ b.claudeRichtig = (s==='gewonnen') ? true : (s==='verloren' ? false : null); }
    }
  });
  save(); render();
}
function setClaude(id,r){ state.bets.forEach(function(b){ if(b.id===id) b.claudeRichtig=r; }); save(); render(); }
function delBet(id){ state.bets=state.bets.filter(function(b){return b.id!==id;}); save(); render(); }
function kombiUebernehmen(){
  var sel = state.vorschlaege.filter(function(v){return v.sel && v.quote;});
  if(sel.length<2){ alert(t('kombiNeed')); return; }
  var produkt=1;
  sel.forEach(function(v){ produkt *= (parseFloat(String(v.quote).replace(',','.'))||1); });
  produkt = Math.round(produkt*100)/100;
  var eingabe = prompt(t('kombiStakeQ'));
  if(eingabe===null) return;
  var einsatz = parseFloat(String(eingabe).replace(',','.'))||0;
  if(einsatz<=0) return;
  var namen = sel.map(function(v){return v.match.split(' - ')[0].split(' – ')[0];}).join(', ');
  addBet({ match:sel.length+'er Kombi ('+namen+')',
    tipp:sel.map(function(v){return v.tipp;}).join(' + '),
    quote:String(produkt), id:'ki-kombi' }, einsatz);
}
function depAdd(){
  var v=parseFloat(String(document.getElementById('einzahlungNeu').value).replace(',','.'));
  if(!isNaN(v)&&v>0){ state.eingezahlt=Math.round((state.eingezahlt+v)*100)/100; save(); render(); }
}
function wdAdd(){
  var v=parseFloat(String(document.getElementById('auszahlungNeu').value).replace(',','.'));
  if(!isNaN(v)&&v>0){ state.ausgezahlt=Math.round(((state.ausgezahlt||0)+v)*100)/100; save(); render(); }
}

function pinPruefen(){
  var v=document.getElementById('pinEingabe').value;
  if(v===state.pin){ entsperrt=true; render(); }
  else{ var f=document.getElementById('pinFehler'); if(f) f.textContent=t('wrongPin'); }
}

function go(x,w){ tab=x; if(w) wtab=w; render(); }

function navUpdate(){
  document.getElementById('nvHome').textContent=t('nvHome');
  document.getElementById('nvBets').textContent=t('nvBets');
  document.getElementById('nvFin').textContent=t('nvFin');
  document.getElementById('nvMore').textContent=t('nvMore');
  document.querySelectorAll('.nav button').forEach(function(el){
    el.classList.toggle('on', el.dataset.tab===tab);
  });
}

function render(){
  var c=calc(), v=document.getElementById("view");
  document.getElementById("heute").textContent=heuteStr();
  navUpdate();
  if(state.pin && !entsperrt){
    document.getElementById("topSaldo").textContent="🔒";
    document.getElementById("topSaldo").style.color="var(--dim)";
    v.innerHTML=viewLock();
    var pe=document.getElementById('pinEingabe');
    if(pe) pe.addEventListener('keyup',function(e){ if(e.key==='Enter') pinPruefen(); });
    return;
  }
  document.getElementById("topSaldo").textContent=fmt(c.gesamt);
  document.getElementById("topSaldo").style.color = c.gesamt>0?"var(--win)":c.gesamt<0?"var(--loss)":"var(--text)";
  if(tab==="home") v.innerHTML=viewHome(c);
  else if(tab==="wetten") v.innerHTML=viewBets(c);
  else if(tab==="finanzen") v.innerHTML=viewFinance(c);
  else v.innerHTML=viewMore();
}
